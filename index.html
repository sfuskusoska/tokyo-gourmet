<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{font-family:"Meiryo","Yu Gothic","Hiragino Sans",sans-serif;background:#FAF7F2;color:#2A2420;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
#hd{flex-shrink:0;background:#fff;border-bottom:1px solid #E2D9CE;display:flex;align-items:center;gap:10px;padding:10px 14px;box-shadow:0 1px 3px rgba(100,60,20,.08);}
#logo{font-size:13px;font-weight:700;color:#2A2420;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px;}
#logo em{font-style:normal;color:#B8622A;}
#fuku{display:inline-block;transform:rotate(-18deg);transform-origin:center bottom;animation:fuku-bounce 3s ease-in-out infinite;line-height:1;}
@keyframes fuku-bounce{0%,100%{transform:rotate(-18deg) translateY(0);}50%{transform:rotate(-15deg) translateY(-2px);}}
#q{flex:1;min-width:0;border:1px solid #E2D9CE;border-radius:20px;padding:6px 13px;font-size:13px;background:#F3EDE4;color:#2A2420;font-family:inherit;outline:none;}
#q::placeholder{color:#C0B8B0;}
#cnt{flex-shrink:0;background:#B8622A;color:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
#vt{flex-shrink:0;background:#fff;border-bottom:1px solid #E2D9CE;display:flex;gap:8px;align-items:center;padding:7px 14px;}
.vb{border:1.5px solid #CFC6BB;border-radius:8px;padding:5px 14px;font-size:12px;font-weight:700;background:#F3EDE4;color:#8A7F76;cursor:pointer;font-family:inherit;}
.vb.on{background:#B8622A;border-color:#B8622A;color:#fff;}
#fb{flex-shrink:0;background:#fff;border-bottom:1px solid #E2D9CE;display:flex;gap:6px;align-items:center;padding:7px 10px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;}
#fb::-webkit-scrollbar{display:none;}
.ch{flex-shrink:0;border:1.5px solid #E2D9CE;border-radius:20px;padding:4px 11px;font-size:12px;font-weight:500;background:#F3EDE4;color:#8A7F76;cursor:pointer;white-space:nowrap;font-family:inherit;user-select:none;}
.ch.on{background:#B8622A;border-color:#B8622A;color:#fff;}
#mn{flex:1;position:relative;min-height:0;overflow:hidden;}
#lv{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px 12px 30px;}
#mv{position:absolute;top:0;left:0;right:0;bottom:0;display:none;}
#map{width:100%;height:100%;}
/* 地図読み込み注意書き */
#map-notice{position:absolute;top:0;left:0;right:0;z-index:1000;background:#FFF8F0;border-bottom:1px solid #E8C8A8;padding:8px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#8A5020;}
#map-notice-close{margin-left:auto;font-size:18px;cursor:pointer;color:#B8622A;padding:0 4px;line-height:1;}
/* ローディング */
#map-loading{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(250,247,242,.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:12px;font-size:13px;color:#8A7F76;}
.spinner{width:32px;height:32px;border:3px solid #E2D9CE;border-top-color:#B8622A;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* 現在地ボタン */
#loc-btn{position:absolute;bottom:80px;right:12px;z-index:1000;width:42px;height:42px;background:#fff;border:1.5px solid #E2D9CE;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(80,40,10,.15);}


/* ── マップスタイル切替 ── */
#map-style-ctrl {
  position:absolute; top:10px; right:10px; z-index:1000;
  display:flex; flex-direction:column; gap:4px;
}
.ms-btn {
  background:#fff; border:1.5px solid #E2D9CE;
  border-radius:8px; padding:5px 10px;
  font-size:11px; font-weight:700; color:#2A2420;
  cursor:pointer; font-family:inherit;
  box-shadow:0 2px 6px rgba(0,0,0,0.12);
  white-space:nowrap; text-align:center;
}
.ms-btn.on { background:#B8622A; border-color:#B8622A; color:#fff; }
.ms-btn:active { opacity:0.8; }

/* Leaflet divIcon デフォルトリセット */
.pin-wrap {
  background: transparent !important;
  border: none !important;
  overflow: visible !important;
}
.leaflet-div-icon {
  background: transparent !important;
  border: none !important;
}

/* Leaflet popup */
.leaflet-popup-content-wrapper{background:#fff!important;border:1px solid #E2D9CE!important;border-radius:10px!important;color:#2A2420!important;box-shadow:0 4px 16px rgba(80,40,10,.15)!important;}
.leaflet-popup-tip{background:#fff!important;}
.leaflet-popup-close-button{color:#8A7F76!important;}
.pp-lk{display:block;text-align:center;background:#B8622A;color:#fff;border-radius:6px;padding:6px;font-size:11px;font-weight:700;text-decoration:none;margin-bottom:5px;}
.pp-list-btn{display:block;text-align:center;background:#F3EDE4;color:#B8622A;border-radius:6px;padding:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #E8C8A8;margin-top:5px;}
/* MarkerCluster */
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background-color:rgba(184,98,42,.25)!important;}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background-color:rgba(184,98,42,.7)!important;color:#fff!important;font-weight:700!important;}

/* ── シャボン玉アニメーション ── */
#bubble-stage {
  position:fixed; left:0; top:0; width:100%; height:100%;
  pointer-events:none; z-index:9999; overflow:hidden;
}
.bubble {
  position:absolute;
  border-radius:16px;
  display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-start;
  text-align:left; font-size:12px; font-weight:500;
  line-height:1.6; padding:12px 14px;
  animation: bubble-rise linear forwards;
  pointer-events:none;
  will-change: transform, opacity;
  min-width:160px; max-width:220px;
  word-break:break-all;
}
@keyframes bubble-rise {
  0%   { transform:translateY(0) scale(0.5) translateX(0);      opacity:0; }
  8%   { transform:translateY(-35px) scale(1) translateX(0);    opacity:1; }
  30%  { transform:translateY(-180px) scale(1) translateX(10px);opacity:1; }
  60%  { transform:translateY(-360px) scale(1) translateX(-8px);opacity:1; }
  85%  { transform:translateY(-520px) scale(1) translateX(5px); opacity:0.8; }
  95%  { transform:translateY(-580px) scale(1) translateX(0);   opacity:0.2; }
  100% { transform:translateY(-620px) scale(1) translateX(0);   opacity:0; }
}

/* ── コメント入力パネル ── */
.cmt-section {
  border-top:1px dashed #E2D9CE;
  padding:10px 0 0;
  margin-top:8px;
}
.cmt-section-title {
  font-size:11px; font-weight:700; color:#8A7F76; margin-bottom:8px;
}
.cmt-list { display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
.cmt-item {
  background:#FFFBF5; border:1px solid #E8D8C8; border-radius:8px;
  padding:7px 10px; font-size:12px;
}
.cmt-item-header { display:flex; justify-content:space-between; margin-bottom:3px; }
.cmt-item-name { font-weight:700; color:#B8622A; font-size:11px; }
.cmt-item-date { font-size:10px; color:#B0A8A0; }
.cmt-item-text { color:#2A2420; line-height:1.6; }
.cmt-form { display:flex; flex-direction:column; gap:5px; }
.cmt-input-name {
  border:1px solid #E2D9CE; border-radius:8px; padding:6px 10px;
  font-size:12px; background:#FDFAF6; font-family:inherit; outline:none;
  color:#2A2420;
}
.cmt-input-text {
  border:1px solid #E2D9CE; border-radius:8px; padding:6px 10px;
  font-size:12px; background:#FDFAF6; font-family:inherit; outline:none;
  resize:none; height:54px; color:#2A2420;
}
.cmt-submit {
  background:#B8622A; color:#fff; border:none; border-radius:8px;
  padding:7px 14px; font-size:12px; font-weight:700; cursor:pointer;
  font-family:inherit; align-self:flex-end;
}
.cmt-submit:active { background:#9A4E1E; }


/* ── キラキラ・グロー・シナプスアニメーション ── */
@keyframes pin-glow {
  0%,100% { box-shadow:0 0 8px 3px rgba(255,210,60,0.8),0 0 18px 6px rgba(255,170,0,0.5),0 2px 6px rgba(0,0,0,0.3); }
  50%      { box-shadow:0 0 18px 8px rgba(255,235,80,1),0 0 36px 14px rgba(255,200,0,0.7),0 2px 6px rgba(0,0,0,0.3); }
}
@keyframes sparkle {
  0%,100% { opacity:0; transform:scale(0.3) rotate(0deg); }
  50%      { opacity:1; transform:scale(1.2) rotate(180deg); }
}
@keyframes resonance-glow {
  0%,100% { box-shadow:0 0 12px 5px rgba(100,200,255,0.8),0 0 24px 10px rgba(60,160,255,0.5); }
  50%      { box-shadow:0 0 22px 10px rgba(140,220,255,1),0 0 44px 18px rgba(80,180,255,0.7); }
}
@keyframes synapse-dash {
  0%   { stroke-dashoffset: 200; opacity:0.3; }
  50%  { opacity:1; }
  100% { stroke-dashoffset: 0;   opacity:0.3; }
}
@keyframes synapse-pulse {
  0%,100% { opacity:0.2; r:4; }
  50%     { opacity:1;   r:7; }
}

/* ── キラキラ（コメント2週間以内）：ゆっくり金色に輝く ── */
@keyframes pin-ring-pulse {
  0%   { transform:scale(1);   opacity:0.7; }
  70%  { transform:scale(2.4); opacity:0.0; }
  100% { transform:scale(2.4); opacity:0.0; }
}
@keyframes pin-ring-pulse2 {
  0%,25% { transform:scale(1);   opacity:0.5; }
  85%    { transform:scale(2.8); opacity:0.0; }
  100%   { transform:scale(2.8); opacity:0.0; }
}
.pin-wrap { position:relative; }
.pin-ring {
  position:absolute;
  width:32px; height:32px;
  border-radius:50%;
  top:3px; left:3px;
  background:rgba(255,200,40,0.5);
  animation: pin-ring-pulse 4s ease-out infinite;
  pointer-events:none;
}
.pin-ring2 {
  position:absolute;
  width:32px; height:32px;
  border-radius:50%;
  top:3px; left:3px;
  background:rgba(255,160,0,0.30);
  animation: pin-ring-pulse2 4s ease-out 1.5s infinite;
  pointer-events:none;
}

/* ── 近接グロー（1km以内）：ゆっくり青く輝く ── */
@keyframes prox-glow {
  0%,100% { box-shadow:0 0 6px 2px rgba(80,160,255,0.7), 0 0 16px 5px rgba(40,100,255,0.35); }
  50%     { box-shadow:0 0 14px 6px rgba(120,200,255,0.9), 0 0 30px 12px rgba(60,140,255,0.55); }
}
@keyframes prox-ring {
  0%   { transform:scale(1);   opacity:0.7; }
  100% { transform:scale(3.2); opacity:0.0; }
}
.pin-prox-ring {
  position:absolute;
  width:32px; height:32px;
  border-radius:50%;
  top:3px; left:3px;
  background:rgba(80,160,255,0.3);
  animation: prox-ring 5s ease-out infinite;
  pointer-events:none;
}
.pin-prox {
  box-shadow:0 0 10px 3px rgba(80,160,255,0.8),
             0 0 20px 7px rgba(40,100,255,0.45) !important;
  animation: prox-glow 3s ease-in-out infinite !important;
}

/* ── シナプス線（Leaflet SVG polyline） ── */
.synapse-line {
  stroke-dasharray: 14, 10;
  animation: synapse-dash 2.5s linear infinite;
}
@keyframes synapse-dash {
  to { stroke-dashoffset: -24; }
}

/* ── 自分ピン ── */
@keyframes user-ping {
  0%   { transform:scale(1);   opacity:0.8; }
  100% { transform:scale(3.8); opacity:0.0; }
}
.user-pin-ring {
  position:absolute;
  width:20px; height:20px;
  border-radius:50%;
  top:-4px; left:-4px;
  background:rgba(60,140,255,0.4);
  animation: user-ping 4s ease-out infinite;
  pointer-events:none;
}
.user-pin-ring2 {
  position:absolute;
  width:20px; height:20px;
  border-radius:50%;
  top:-4px; left:-4px;
  background:rgba(60,140,255,0.22);
  animation: user-ping 4s ease-out 1.8s infinite;
  pointer-events:none;
}

</style>

{id:80,n:'大和寿司',a:'豊洲市場',t:'sushi',lat:35.6482,lng:139.7857,d:'豊洲市場内の本物の寿司屋。安くて本物のネタが食べられると各局が定期的に取材。市場移転後から聖地的な存在に。',h:'5:30〜14:00 日曜定休',b:'3,000〜6,000円',s:['報道取材定番'],u:'https://tabelog.com/tokyo/A1313/A131305/13018354/'},
{id:81,n:'まぐろや くろぎん',a:'築地場外市場',t:'sushi',lat:35.6653,lng:139.7700,d:'SNSでバズった築地の人気まぐろ専門店。GWは行列必至。No.1セット（各部位の食べ比べ）が名物。',h:'8:00〜13:00 無休',b:'2,000〜5,000円',s:['築地定番'],u:''},
{id:90,n:'スタミナ苑',a:'足立区鹿浜',t:'yakiniku',lat:35.8012,lng:139.7583,d:'辺鄙な立地なのに食べログ焼肉全国上位常連。地元発祥の本物の焼肉。各局が知る人ぞ知る系特集で定期登場。',h:'火水日 17:00〜23:00',b:'6,000〜10,000円',s:['食べログ百名店','報道取材'],u:'https://tabelog.com/tokyo/A1324/A132404/13000330/'},
{id:91,n:'大はし',a:'北千住',t:'yakiniku',lat:35.7491,lng:139.8025,d:'1877年創業。もつ煮の老舗として知られる。報道番組の東京最古の居酒屋特集で頻出。下町の飲み処として長年地元に愛される。',h:'16:00〜22:30 月曜定休',b:'2,000〜4,000円',s:['報道取材','下町老舗'],u:'https://tabelog.com/tokyo/A1324/A132403/13009024/'},
{id:100,n:'ナンマンゴギ',a:'新大久保',t:'korean',lat:35.7012,lng:139.6997,d:'常時0.5度の塩水で低温熟成させた豚肉を炭火で焼くサムギョプサル専門店。まず塩とわさびだけで食べてほしいと勧められるほど肉の味が違う。',h:'11:00〜23:00 無休',b:'2,500〜5,000円',s:['新大久保本格コリアン'],u:''},
{id:101,n:'元祖 宋家 本館',a:'新大久保',t:'korean',lat:35.7010,lng:139.6993,d:'新大久保で23年続くカムジャタン（豚背骨とじゃがいもの鍋）専門店。メニューはほぼカムジャタンのみ。それで23年続いてきた実力。',h:'17:00〜23:00 月曜定休',b:'2,500〜4,500円',s:['新大久保老舗コリアン'],u:''},
{id:110,n:'竹むら',a:'神田',t:'cafe',lat:35.6950,lng:139.7683,d:'1930年創業。粟ぜんざいと揚げまんじゅうが名物。国の有形文化財の建物で食べる体験は唯一無二。NHKの昭和の東京特集の常連。酒場放浪記にも登場。',h:'11:00〜20:30 日曜定休',b:'1,000〜2,000円',s:['神田老舗','酒場放浪記'],u:'https://tabelog.com/tokyo/A1310/A131002/13002003/'},
{id:111,n:'梅むら',a:'浅草',t:'cafe',lat:35.7117,lng:139.7965,d:'豆かんとみつ豆の老舗甘味処。浅草の空気と一緒に食べる価値あり。観光客も来るが地元の常連が多い本物の甘味屋。',h:'11:00〜19:30 水曜定休',b:'〜1,500円',s:['浅草老舗','報道取材'],u:'https://tabelog.com/tokyo/A1311/A131102/13005394/'},
{id:112,n:'木馬',a:'渋谷・桜丘',t:'cafe',lat:35.6580,lng:139.7000,d:'渋谷の大規模再開発を生き延びた奇跡の昭和純喫茶。もはやそれだけで価値がある。渋谷の昔を知る常連が通う場所。',h:'8:00〜23:00 無休',b:'〜1,000円',s:['渋谷昭和遺産'],u:''},
{id:120,n:'庄助',a:'門前仲町',t:'kodoku',lat:35.6720,lng:139.7983,d:'孤独のグルメS1第1話に登場した記念すべき第1聖地。焼き鳥と焼きめしというシンプルながら満足感の高い料理が初回にふさわしい王道の味。',h:'17:00〜22:30 月曜定休',b:'2,000〜4,000円',s:['孤独のグルメS1第1話'],u:''},
{id:121,n:'三ちゃん食堂',a:'板橋',t:'kodoku',lat:35.7519,lng:139.7105,d:'孤独のグルメS2第1話に登場した大衆食堂。昔ながらの定食スタイルが魅力。五郎が食べた料理を聖地巡礼できる。',h:'11:00〜15:00/17:00〜21:00 月曜定休',b:'〜1,500円',s:['孤独のグルメS2第1話'],u:''},
{id:122,n:'みつわ',a:'西荻窪',t:'kodoku',lat:35.7046,lng:139.6070,d:'孤独のグルメS2第1話に登場した広島風お好み焼き店。五郎さんが満面の笑みで食べた回として記憶される名シーン。',h:'11:30〜22:00 月曜定休',b:'1,000〜2,000円',s:['孤独のグルメS2第1話'],u:''},
{id:123,n:'だるまや',a:'小岩',t:'kodoku',lat:35.7337,lng:139.8674,d:'孤独のグルメS5第1話に登場した小岩の定食屋。昔ながらの定食スタイルが魅力で生姜焼き定食が特に人気。',h:'11:00〜21:00 水曜定休',b:'〜1,500円',s:['孤独のグルメS5第1話'],u:''},
{id:124,n:'ノング インレイ',a:'高田馬場',t:'kodoku',lat:35.7126,lng:139.7036,d:'孤独のグルメに登場したミャンマー料理店。高田馬場の多国籍エリアに位置する本格派。独自のスパイス使いと素朴な家庭料理が評判。',h:'11:00〜21:00 火曜定休',b:'1,000〜2,000円',s:['孤独のグルメ'],u:'https://tabelog.com/tokyo/A1305/A130502/13150413/'},
{id:125,n:'きっちん大浪',a:'吉祥寺',t:'kodoku',lat:35.7030,lng:139.5795,d:'孤独のグルメ「それぞれ」第11話に登場した吉祥寺の洋食屋。煮付けが名物。吉祥寺の地元民に愛される昔ながらの洋食店。',h:'11:30〜21:00 月曜定休',b:'1,000〜2,000円',s:['孤独のグルメ（それぞれ）第11話'],u:''},
{id:130,n:'丸千葉',a:'南千住',t:'sakaba',lat:35.7355,lng:139.8035,d:'酒場放浪記に登場した南千住の老舗大衆居酒屋。吉田類さんの常連スポット。南千住の情緒ある一軒。',h:'16:00〜23:00 日月定休',b:'2,000〜4,000円',s:['酒場放浪記'],u:''},
{id:131,n:'大林',a:'篠崎',t:'sakaba',lat:35.6994,lng:139.9017,d:'コの字カウンターの最高峰と称される大衆酒場の伝説的存在。孤独のグルメ・酒場放浪記・今夜はコの字での三番組に登場した稀有な聖地。',h:'17:00〜22:30 月火定休',b:'2,000〜3,500円',s:['孤独のグルメ','酒場放浪記','今夜はコの字で'],u:''},
{id:132,n:'もがみや',a:'浅草',t:'sakaba',lat:35.7117,lng:139.7968,d:'酒場放浪記で中村勘九郎との対談回に登場した名居酒屋。浅草の地元民に長年愛される。',h:'17:00〜23:00 月曜定休',b:'2,000〜4,000円',s:['酒場放浪記'],u:''},
{id:140,n:'のんき',a:'堀切菖蒲園',t:'drama',lat:35.7502,lng:139.8530,d:'コの字カウンター17〜18席。今夜はコの字でに登場。強炭酸の酎ハイボールが名物。創業50年以上の老舗酒場。',h:'17:00〜23:00 月曜定休',b:'2,000〜3,000円',s:['今夜はコの字で'],u:''},
{id:141,n:'大力酒蔵',a:'金町',t:'drama',lat:35.7656,lng:139.8692,d:'今夜はコの字でに登場。コンロ付きのコの字カウンターで自分でホルモンを手焼きするスタイルが独特。',h:'17:00〜22:00 月火定休',b:'2,000〜3,500円',s:['今夜はコの字で'],u:''},
{id:142,n:'燗コーヒー藤々',a:'四谷・荒木町',t:'drama',lat:35.6876,lng:139.7270,d:'今夜はコの字でS2に登場。迷路のような路地を抜けた先に佇むコの字酒場。二人で営む穏やかな空間が心地よい。',h:'18:00〜24:00 日曜定休',b:'2,500〜4,000円',s:['今夜はコの字でS2'],u:''},
{id:143,n:'大坂屋',a:'門前仲町',t:'drama',lat:35.6730,lng:139.7983,d:'今夜はコの字でに登場。三日月型カウンターで牛にこみを堪能できる大衆酒場。門前仲町の老舗として知られる。',h:'16:00〜23:00 月曜定休',b:'2,000〜3,500円',s:['今夜はコの字で'],u:''},
  {id:200,n:'ヒロキ',            a:'下北沢',        t:'kodoku',     lat:35.6618,lng:139.6681, d:'孤独のグルメS1に登場した下北沢の老舗洋食屋。昭和の洋食屋らしい温かみのある空間で、日替わり定食と手作りのソースが人気。下北沢という若者の街に馴染んだ大人の隠れ家的一軒。',h:'11:30〜21:00 月曜定休',b:'1,000〜1,500円',s:['孤独のグルメS1'],u:''},
  {id:201,n:'中華飯店 一番',     a:'町屋',          t:'kodoku',     lat:35.7423,lng:139.7863, d:'孤独のグルメ「それぞれ」第1話に登場した町屋の町中華。海老チャーハンが看板メニューで、昔ながらの町中華らしい飾らないうまさが光る。地元の常連客で昼時は賑わう下町の名店。',h:'11:00〜21:00 火曜定休',b:'〜1,500円',s:['孤独のグルメ（それぞれ）第1話'],u:''},
  {id:202,n:'もつ焼き ばん',     a:'高田馬場',      t:'kodoku',     lat:35.7130,lng:139.7040, d:'孤独のグルメに複数回登場した高田馬場のもつ焼き店。芸人コラボ回でも話題になった。串1本から気軽に飲める大衆スタイルで、学生街の高田馬場では珍しいガチのもつ焼き。煙と活気が昭和の酒場を再現している。',h:'17:00〜23:00 日曜定休',b:'1,500〜3,000円',s:['孤独のグルメ'],u:''},
  {id:203,n:'みたけ食堂',        a:'足立区谷在家',  t:'kodoku',     lat:35.7638,lng:139.8082, d:'孤独のグルメ「それぞれ」第2話に登場したセルフ式食堂。朝ごはんが名物で、地元の工場労働者や近隣住民が早朝から訪れる。トレーに料理を自分で選ぶ昔ながらのスタイルが今も残る。',h:'6:00〜14:00 不定休',b:'〜800円',s:['孤独のグルメ（それぞれ）第2話'],u:''},
  {id:204,n:'京城園',            a:'神保町',        t:'kodoku',     lat:35.6958,lng:139.7579, d:'孤独のグルメ「それぞれ」第3話に登場した神保町の焼肉店。タン塩とゲタカルビが看板で、煙が立ち込める昔ながらの焼肉スタイルが魅力。本の街・神保町で一人焼肉を楽しむ五郎の姿が印象的な回。',h:'11:30〜22:00 日曜定休',b:'2,000〜4,000円',s:['孤独のグルメ（それぞれ）第3話'],u:''},
  {id:205,n:'すし台所家',        a:'三軒茶屋',      t:'kodoku',     lat:35.6439,lng:139.6703, d:'孤独のグルメに登場した三軒茶屋のカジュアル寿司店。立ち飲みスタイルで気軽に本格寿司が楽しめる。三茶の飲み屋街の一角にあり、仕事帰りに一人でふらりと立ち寄れる雰囲気が五郎的世界観にぴったり。',h:'17:00〜23:00 月曜定休',b:'2,000〜4,000円',s:['孤独のグルメ'],u:''},
  {id:206,n:'しゃぶ辰',          a:'西巣鴨',        t:'kodoku',     lat:35.7440,lng:139.7233, d:'孤独のグルメS10頃に登場した西巣鴨のしゃぶしゃぶ店。リーズナブルな価格で本格のしゃぶしゃぶが食べられると地元で長年愛されている。静かな住宅街の中にある、気どりのない大衆割烹スタイルの名店。',h:'11:30〜21:00 水曜定休',b:'1,500〜3,000円',s:['孤独のグルメ'],u:''},
  {id:210,n:'赤垣',              a:'浅草',          t:'sakaba',     lat:35.7120,lng:139.7970, d:'酒場放浪記に登場した浅草の情緒ある赤提灯居酒屋。仲見世裏の路地に佇む昔ながらの大衆酒場で、浅草らしい下町の空気感が濃い。常連客が作り出す温かい雰囲気と、気取りのないつまみが吉田類さんのハートを掴んだ一軒。',h:'17:00〜23:00 月曜定休',b:'2,000〜3,500円',s:['酒場放浪記'],u:''},
  {id:211,n:'壇太',              a:'白金台',        t:'sakaba',     lat:35.6387,lng:139.7222, d:'酒場放浪記で吉田類さんがグッドエイジャー賞受賞後に一人祝賀会を行ったことで話題になった白金台の居酒屋。おしゃれな街に佇む飾らない大衆酒場で、その佇まいのギャップが印象的。魚料理が評判の味のある一軒。',h:'17:00〜23:00 日曜定休',b:'2,000〜4,000円',s:['酒場放浪記'],u:''},
  {id:212,n:'味の笛 本店',       a:'御徒町',        t:'sakaba',     lat:35.7079,lng:139.7769, d:'酒場放浪記に登場した御徒町の立ち飲み店。吉池系列で干物の品質が高く、焼きたての干物を立ち飲みで楽しめるスタイルが人気。アメ横に近い立地で、仕事帰りのサラリーマンから観光客まで幅広く愛されている。',h:'11:00〜22:00 無休',b:'1,500〜3,000円',s:['酒場放浪記'],u:''},
  {id:213,n:'鳥万 本店',         a:'蒲田',          t:'sakaba',     lat:35.5636,lng:139.7162, d:'酒場放浪記に登場した蒲田の老舗大衆酒場。一人鍋が名物で、一人でも気兼ねなく鍋が楽しめるスタイルが蒲田の飲兵衛に長年愛されている。昭和の雰囲気をそのまま残す内装と、リーズナブルな価格設定が魅力。',h:'17:00〜22:30 日曜定休',b:'2,000〜3,500円',s:['酒場放浪記'],u:''},
  {id:214,n:'大衆酒場 斎藤',     a:'十条',          t:'sakaba',     lat:35.7570,lng:139.7210, d:'1928年創業。十条の老舗大衆酒場で、酒場放浪記に登場。長年通い続ける常連客が作り出す独特の温かさが魅力。十条という下町の雰囲気とあいまって、昭和の大衆酒場文化が今も生きている一軒。',h:'16:00〜23:00 月曜定休',b:'1,500〜3,000円',s:['酒場放浪記'],u:''},
  {id:220,n:'紫金飯店',          a:'原宿',          t:'machichuka', lat:35.6699,lng:139.7025, d:'町中華で飲ろうぜに登場し、番組公式フェスにも出店した原宿の人気中華店。原宿という意外な立地で昭和の町中華文化を守り続ける。玉袋筋太郎さんも絶賛したチャーハンと餃子が看板で、ランチタイムは行列必至。',h:'11:00〜21:00 火曜定休',b:'〜1,500円',s:['町中華で飲ろうぜ'],u:''},
  {id:221,n:'珍来 公園前店',     a:'新高島平',      t:'machichuka', lat:35.7862,lng:139.6537, d:'町中華で飲ろうぜに登場した新高島平の老舗町中華。あさりラーメンが名物で、複数の番組でも取り上げられた。都営三田線の終点近くという立地ながら、その味を求めて遠方から訪れる客も多い知る人ぞ知る名店。',h:'11:00〜21:00 月曜定休',b:'〜1,500円',s:['町中華で飲ろうぜ'],u:''},
  {id:222,n:'達磨',              a:'新宿東口',      t:'machichuka', lat:35.6958,lng:139.7030, d:'町中華で飲ろうぜに登場した新宿東口の老舗町中華。皿うどんが人気メニューで、新宿という大都会の中でひっそりと昭和の中華食堂の空気を守り続けている。歌舞伎町の喧騒を避けた裏路地にある隠れ家的存在。',h:'11:30〜22:00 不定休',b:'〜1,500円',s:['町中華で飲ろうぜ'],u:''},
  {id:223,n:'昇龍',              a:'上野アメ横',    t:'machichuka', lat:35.7088,lng:139.7763, d:'町中華で飲ろうぜに登場した上野アメ横の焼き餃子の名店。アメ横という観光地の中でも地元民に長く愛され続ける本物の味。羽根つき餃子のパリッとした食感と、ニンニクの効いたタレが名物。昼から飲める立地も魅力。',h:'11:00〜22:00 不定休',b:'〜1,500円',s:['町中華で飲ろうぜ'],u:''},
  {id:224,n:'菜来軒',            a:'錦糸町',        t:'machichuka', lat:35.6960,lng:139.8156, d:'町中華で飲ろうぜに登場した錦糸町の人情中華。パワフルな女将が仕切る賑やかな店内で、大盛りサービスと威勢のいい接客が名物。錦糸町の下町文化を体現する一軒で、常連客との掛け合いも楽しみのひとつ。',h:'11:00〜21:30 月曜定休',b:'〜1,500円',s:['町中華で飲ろうぜ'],u:''},
  {id:230,n:'一力',              a:'小岩',          t:'drama',      lat:35.7337,lng:139.8670, d:'今夜はコの字でに登場した小岩の老舗大衆酒場。創業60年以上で、炭火の煙と逆さコの字カウンターが名物。小岩という下町の中でも特に庶民的な雰囲気が漂い、地元の飲兵衛たちが長年通い続ける変わらない聖地。',h:'17:00〜23:00 月曜定休',b:'2,000〜3,500円',s:['今夜はコの字で'],u:''},
  {id:231,n:'焼鳥 しょうちゃん', a:'神楽坂',        t:'drama',      lat:35.7017,lng:139.7403, d:'今夜はコの字でS1に登場した神楽坂の焼き鳥店。頑固な店主と常連客の掛け合いが番組の名シーンとなった。神楽坂という粋な街に馴染む小さな焼き鳥屋で、炭火焼きの本格的な一串と雰囲気が客を虜にする。',h:'18:00〜23:00 日曜定休',b:'2,000〜4,000円',s:['今夜はコの字でS1'],u:''},
  {id:232,n:'丸木屋商店',        a:'渋谷',          t:'drama',      lat:35.6600,lng:139.7020, d:'今夜はコの字でに登場した渋谷の希少なコの字酒場。再開発が進む渋谷においてコの字カウンターの酒場が生き残っていること自体が奇跡的。昭和の雰囲気と現代の渋谷の対比がドラマの重要な舞台となった一軒。',h:'17:00〜23:00 日曜定休',b:'2,000〜3,500円',s:['今夜はコの字で'],u:''},
  {id:233,n:'代々木ミルクホール', a:'代々木',        t:'drama',      lat:35.6832,lng:139.7025, d:'今夜はコの字でに登場した代々木のレトロな酒場。ミルクホールという名前から漂う大正〜昭和初期の雰囲気をコンセプトにした独特の空間で、コの字カウンターとレトロな内装が評判。代々木という立地も独特の味わいを加えている。',h:'18:00〜24:00 月曜定休',b:'2,000〜3,500円',s:['今夜はコの字で'],u:''},
  {id:234,n:'酒蔵きたやま',      a:'大塚',          t:'drama',      lat:35.7295,lng:139.7283, d:'今夜はコの字でに登場した大塚の地元密着型コの字酒場。大塚という飲み屋街の中でも特に地元民に愛される一軒で、リーズナブルな価格と気さくなスタッフが魅力。コの字カウンターを囲む常連同士の会話が自然と生まれる温かい空間。',h:'17:00〜23:00 月曜定休',b:'1,500〜3,000円',s:['今夜はコの字で'],u:''},
  {id:235,n:'埼玉屋',            a:'東十条',        t:'drama',      lat:35.7678,lng:139.7216, d:'今夜はコの字でに登場した東十条の大衆酒場。赤羽・十条・東十条の北方黄金三角地帯の一角を担う名店。昭和の香りが漂う飲み屋街の中でも特に気どりのない素朴なスタイルが、下町飲み好きのハートをがっちり掴む。',h:'16:00〜23:00 月曜定休',b:'1,500〜3,000円',s:['今夜はコの字で'],u:''},
  {id:236,n:'大衆酒場 明星',     a:'板橋',          t:'drama',      lat:35.7522,lng:139.7100, d:'今夜はコの字でに登場した板橋の老舗大衆酒場。壁ぎりぎりに設置されたコの字カウンターが名物で、隣客との距離感の近さがかえって会話を生む。1923年創業という歴史の重さが、何も足さない素朴な料理と空間に滲み出ている。',h:'17:00〜22:30 日曜定休',b:'1,500〜3,000円',s:['今夜はコの字で'],u:''},
  {id:240,n:'大貫',              a:'六本木',        t:'yakiniku',   lat:35.6627,lng:139.7314, d:'六本木という観光地のイメージとは真逆の、本物志向の炭火焼きホルモン名店。都内の食通・シェフたちが足繁く通う実力店で、六本木なのに観光客向けでない硬派な雰囲気が際立つ。希少部位のホルモンを炭火で丁寧に焼き上げる技が評判。',h:'18:00〜23:00 月曜定休',b:'4,000〜8,000円',s:['食通御用達'],u:''},
  {id:241,n:'かつ好',            a:'神田',          t:'youshoku',   lat:35.6950,lng:139.7680, d:'神田のサラリーマンの聖地として長年愛されるとんかつ定食の名店。昼時は行列ができるほどの人気ながら価格は昔のまま据え置き。衣の香ばしさと肉のジューシーさのバランスが絶妙で、神田に来たら必ず寄るべき一軒として地元に根付いている。',h:'11:00〜14:00/17:00〜20:00 土日定休',b:'〜1,500円',s:['神田定番','サラリーマンの聖地'],u:''},
  {id:242,n:'根津 鮨処 もと村',  a:'根津',          t:'sushi',      lat:35.7193,lng:139.7625, d:'下町・根津の江戸前鮨の名店。予約困難になった今も地元客が軸となる、本物の町寿司の空気が残る一軒。職人が目の前で握る江戸前の仕事は丁寧で、ネタの鮮度と技が光る。観光地化していない根津の街に馴染んだ大人の鮨屋。',h:'12:00〜14:00/18:00〜22:00 月曜定休',b:'10,000〜20,000円',s:['根津隠れ名店'],u:''},
  {id:243,n:'珉珉',              a:'渋谷',          t:'machichuka', lat:35.6584,lng:139.7002, d:'昭和から続く餃子の名店。焼き餃子の基準になると言われるほどの実力で、シンプルな材料と確かな技が生み出す一皿は飽きのこない美味しさ。渋谷・新橋などに展開するが、創業以来の味を守り続ける姿勢が地元客の信頼を集めている。',h:'11:30〜22:00 無休',b:'〜1,500円',s:['渋谷定番','老舗餃子'],u:''},
  {id:244,n:'更科堀井',          a:'麻布十番',      t:'cafe',       lat:35.6561,lng:139.7369, d:'江戸そばの本流を継ぐ麻布十番の老舗蕎麦店。本物の江戸前の更科そばが味わえる東京を代表する蕎麦屋のひとつ。観光客も訪れるが長年通う地元の常連が多い本物の蕎麦屋。白く透き通る更科そばの品のある味わいは唯一無二。',h:'11:30〜21:00 水曜定休',b:'1,500〜4,000円',s:['麻布十番老舗','江戸そばの名店'],u:''},
  {id:245,n:'鳥茂',              a:'上野アメ横',    t:'izakaya',    lat:35.7090,lng:139.7760, d:'アメ横の焼き鳥の老舗。昭和から変わらない煙と値段で、観光客も地元民も集まるアメ横の名物店。炭火で丁寧に焼かれた串は、アメ横の雑踏の中でひときわ食欲をそそる煙を上げる。立ち食いスタイルで気軽に楽しめる昭和の味。',h:'11:00〜21:00 不定休',b:'〜2,000円',s:['上野定番','アメ横名物'],u:''},
  {id:246,n:'鳥しき',            a:'目黒',          t:'izakaya',    lat:35.6335,lng:139.7160, d:'食べログ焼き鳥全国1位を何度も獲得した予約困難の焼き鳥の頂点。備長炭で一本ずつ丁寧に焼き上げる職人技が、素材の旨さを極限まで引き出す。目黒という立地ながら全国から予約が殺到する日本最高峰の焼き鳥屋のひとつ。',h:'完全予約制・要確認',b:'15,000〜25,000円',s:['食べログ百名店','焼き鳥の最高峰'],u:'https://tabelog.com/tokyo/A1316/A131601/13136864/'},
  {id:247,n:'三州屋',            a:'銀座',          t:'izakaya',    lat:35.6700,lng:139.7638, d:'銀座・神田に展開する老舗大衆割烹。カウンターで昼から一杯飲める気取りのないスタイルが銀座という高級エリアで独自の地位を確立。焼き魚定食と煮物が評判で、銀座のサラリーマンが日常使いする本物の大衆割烹。',h:'11:00〜22:00 日曜定休',b:'1,000〜3,000円',s:['銀座の大衆割烹'],u:''},
  {id:248,n:'すし屋の野七',      a:'赤羽',          t:'sushi',      lat:35.7785,lng:139.7212, d:'赤羽の立ち飲み寿司の名店。昼から地元民でぎゅうぎゅうになる本物の大衆寿司屋で、市場直送のネタをリーズナブルに提供。赤羽の飲み文化を象徴する一軒で、立ちながら握りをつまみにホッピーを飲む光景が日常的に見られる。',h:'11:00〜21:00 月曜定休',b:'1,500〜3,000円',s:['赤羽定番','立ち飲み寿司'],u:''},
  {id:249,n:'寿司大',            a:'豊洲市場',      t:'sushi',      lat:35.6480,lng:139.7855, d:'豊洲市場内にある開場前から行列ができる人気寿司店。市場で働く人たちと同じ値段で本物の鮮度のネタが食べられると評判。早朝から並んででも食べる価値ありと評される、豊洲市場の象徴的な一軒。大和寿司と並ぶ市場寿司の双璧。',h:'5:30〜13:30頃 日曜定休',b:'3,000〜8,000円',s:['豊洲市場定番','報道取材'],u:''},
  {id:250,n:'鍵屋',              a:'根津',          t:'izakaya',    lat:35.7196,lng:139.7619, d:'江戸時代創業とも伝わる日本最古クラスの居酒屋。根津という下町に佇む歴史的建造物のような一軒で、昭和どころか江戸の空気が漂う。日本酒と昔ながらのつまみで過ごす時間は、東京でしか体験できない唯一無二の居酒屋体験。',h:'17:00〜22:00 月曜定休',b:'2,000〜4,000円',s:['根津老舗','日本最古級居酒屋'],u:''},
  {id:251,n:'江戸一',            a:'神田',          t:'youshoku',   lat:35.6946,lng:139.7685, d:'神田の老舗うなぎ料理店。カウンターで気軽にうなぎが食べられる大衆スタイルが神田のサラリーマンに長年愛されている。高級料理のイメージが強いうなぎを、気取らず手頃に食べられる貴重な存在として神田の食文化を支えてきた一軒。',h:'11:30〜14:00/17:00〜21:00 土日定休',b:'2,000〜4,000円',s:['神田老舗','うなぎの名店'],u:''},
  {id:252,n:'赤津加',            a:'神田',          t:'izakaya',    lat:35.6948,lng:139.7680, d:'神田の路地裏に佇む昭和の居酒屋。みますやと並ぶ神田の老舗居酒屋で、文豪や芸術家が通ったとも言われる。木造の古い建物と、日本酒と気の利いたつまみだけのシンプルなスタイルが、本物の居酒屋文化を今に伝える。',h:'17:00〜23:00 土日定休',b:'2,000〜4,000円',s:['神田老舗','文人に愛された居酒屋'],u:''},
  {id:253,n:'蒼龍唐玉堂',        a:'新宿',          t:'machichuka', lat:35.6960,lng:139.7000, d:'新宿の本格ガチ中華の代表店。中国人客が集まる本物の中国料理で、羊肉の串焼きと本場の麻辣料理が看板。東京にいながら中国の食文化が感じられ、インバウンドブームを超えた本物志向の客に支持される新宿の名店。',h:'11:00〜23:00 無休',b:'1,500〜3,000円',s:['新宿ガチ中華','本場の味'],u:''},
  {id:300,n:'楊 2号店',          a:'池袋',          t:'machichuka', lat:35.7295,lng:139.7109, d:'孤独のグルメS1に登場した池袋の中華料理店。池袋西口エリアに佇む大衆中華で、ボリューム満点の料理が学生・サラリーマンに長年愛されている。五郎が一人で黙々と食べる姿が印象的な回として記憶される名店。',h:'11:00〜22:00 月曜定休',b:'〜1,500円',s:['孤独のグルメS1'],u:''},
  {id:301,n:'中華・洋食 やよい',  a:'荻窪',          t:'kodoku',     lat:35.7052,lng:139.6215, d:'孤独のグルメS8第12話に登場した荻窪の和洋折衷の大衆食堂。中華と洋食が混在するメニュー構成が独特で、地元の常連客に長年愛されている。荻窪という下町エリアに根付いた昭和の雰囲気が漂う飾らない一軒。',h:'11:00〜21:00 火曜定休',b:'〜1,500円',s:['孤独のグルメS8'],u:''},
  {id:302,n:'伊勢屋食堂',         a:'大久保（淀橋市場内）', t:'kodoku', lat:35.7010,lng:139.6980, d:'孤独のグルメに登場した淀橋市場内の食堂。市場で働く人たちのための食堂という独特の立地が魅力で、朝早くから営業する本物の市場飯が食べられる。気取りのない素朴な料理と、市場の活気に包まれた唯一無二の食体験。',h:'6:00〜14:00 日曜定休',b:'〜1,000円',s:['孤独のグルメ'],u:''},
  {id:303,n:'薬膳スープカレー シャナイア', a:'目黒', t:'curry',      lat:35.6340,lng:139.7162, d:'孤独のグルメに登場した目黒の薬膳スープカレー専門店。独特のスパイスと薬膳食材を組み合わせたスープカレーに五郎が感動した回として話題になった。体に優しい素材と本格的なスパイスの融合が評判の個性派カレー店。',h:'11:30〜22:00 火曜定休',b:'1,500〜2,500円',s:['孤独のグルメ'],u:''},
  {id:304,n:'中華 珍来',          a:'新高島平',      t:'machichuka', lat:35.7870,lng:139.6530, d:'町中華で飲ろうぜに登場した新高島平の老舗町中華。有吉さんぽ・町中華で飲ろうぜなど複数の番組でも取り上げられた実力店。あさりラーメンと並ぶ名物料理が複数あり、都営三田線の終点エリアで地元民に長く愛されている。',h:'11:00〜21:00 月曜定休',b:'〜1,500円',s:['町中華で飲ろうぜ','有吉さんぽ'],u:''},
  {id:305,n:'味楽',               a:'新宿',          t:'machichuka', lat:35.6942,lng:139.7006, d:'町中華で飲ろうぜの番組フェスに出店した新宿の町中華。玉袋筋太郎さんも太鼓判を押す昭和の中華食堂スタイルで、ボリュームと味の両立が評判。新宿の喧騒の中にあっても変わらない昔ながらの雰囲気が根強いファンを持つ。',h:'11:00〜21:30 月曜定休',b:'〜1,500円',s:['町中華で飲ろうぜ'],u:''},
  {id:306,n:'太幸苑',             a:'立川',          t:'machichuka', lat:35.6984,lng:139.4128, d:'町中華で飲ろうぜの番組フェスに出店した立川の老舗町中華。立川という東京郊外の街で長年地元民に愛され続ける本物の中華食堂。番組出演をきっかけに知名度が上がったが、変わらない味と雰囲気で常連客の信頼を保ち続けている。',h:'11:00〜21:00 火曜定休',b:'〜1,500円',s:['町中華で飲ろうぜ'],u:''},
  {id:307,n:'中華食堂 日高屋',    a:'各所（新宿・渋谷等）', t:'machichuka', lat:35.6938,lng:139.7034, d:'町中華で飲ろうぜで玉袋筋太郎さんが「町中華として敬意を払うべき存在」と語ったチェーン町中華。リーズナブルな価格と安定した味で東京の食文化を支え、深夜営業や居酒屋使いもできる懐の深さが多くの人に愛されている。',h:'24時間営業（店舗による）',b:'〜1,000円',s:['町中華で飲ろうぜ'],u:''},
  {id:308,n:'築地場外市場',        a:'築地',          t:'sushi',      lat:35.6653,lng:139.7700, d:'朝の情報番組の定番ロケ地。豊洲移転後も場外市場は健在で、鮮魚・干物・玉子焼きなど食べ歩きグルメが充実。各局の食レポが毎週のように撮影される東京の食の聖地。まぐろや玉子焼きは朝早くから行列ができる人気スポット。',h:'店舗により異なる（早朝〜14時頃）',b:'500〜3,000円',s:['報道取材定番','朝の情報番組'],u:''},
  {id:400,n:'御飯家',            a:'目黒',          t:'ueno', lat:35.6339,lng:139.7155, d:'植野食堂第1回放送の記念すべき初回ロケ地。豚のしょうが焼きを教わった目黒の名店。植野広生が最初に選んだ「ふつうで美味しい」の原点ともいえる一軒。昔ながらの食堂スタイルで、毎日食べたくなる優しい味が評判。',h:'11:30〜14:00/18:00〜22:00 月曜定休',b:'1,000〜2,000円',s:['植野食堂第1回'],u:''},
  {id:401,n:'グリルグランド',     a:'浅草',          t:'ueno', lat:35.7117,lng:139.7958, d:'植野食堂でオムライスを教わった1941年創業の浅草の老舗洋食店。昔ながらのチキンライスを薄焼き卵で包む正統派オムライスが看板。浅草の観光地に佇みながらも地元客が通い続ける本物の洋食屋。デミグラスソースも絶品。',h:'11:30〜21:00 火曜定休',b:'1,500〜3,000円',s:['植野食堂'],u:'https://tabelog.com/tokyo/A1311/A131102/13006803/'},
  {id:402,n:'水口食堂',          a:'浅草',          t:'ueno', lat:35.7125,lng:139.7965, d:'植野食堂で肉豆腐を教わった浅草の大衆食堂。100種類以上のメニューを誇る圧倒的なラインナップで地元民に愛され続ける。肉豆腐は食べると旨味がじわりと広がるしみじみ美味しい一品。浅草の昭和の空気そのままの食堂。',h:'11:00〜21:00 月曜定休',b:'〜1,500円',s:['植野食堂'],u:'https://tabelog.com/tokyo/A1311/A131102/13001918/'},

function getBusyScore(type, hour, isWeekend){
  var base = BUSY_DEFAULT[type] || BUSY_DEFAULT.ramen;
  var score = base[hour] || 0;
  if(isWeekend) score = Math.min(3, score + 1);
  return score;
}
function getBusyLabel(score){
  return ['⚪ 空いてる','🟡 やや混む','🟠 混んでる','🔴 激混み'][score];
}
function getBusyColor(score){
  return ['#8A8A8A','#C8A020','#D06020','#B01010'][score];
}
// 現在の混雑傾向を返す
function getCurrentBusy(type){
  var now = new Date();
  var isWeekend = (now.getDay() === 0 || now.getDay() === 6);
  return getBusyScore(type, now.getHours(), isWeekend);
}
// 今日の時間帯別グラフデータ（6時〜24時）
function getTodayBusy(type){
  var now = new Date();
  var isWeekend = (now.getDay() === 0 || now.getDay() === 6);
  var result = [];
  for(var h=6; h<=23; h++){
    result.push({h:h, s:getBusyScore(type, h, isWeekend)});
  }
  return result;
}

// ── コメント管理（Firebase） ──
function getCmts(id){
  // localStorageから（即時返却用）
  try{ return JSON.parse(localStorage.getItem('cmt_'+id)||'[]'); }catch(e){ return []; }
}

function loadCmtsFromFirebase(id, callback){
  db.ref('comments/' + id).once('value', function(snap){
    var data = snap.val();
    var cmts = data ? Object.values(data) : [];
    cmts.sort(function(a,b){ return (a.ts||0)-(b.ts||0); });
    // localStorageにも同期
    localStorage.setItem('cmt_'+id, JSON.stringify(cmts));
    callback(cmts);
  });
}

function getCmts(id){
  try{ return JSON.parse(localStorage.getItem('cmt_'+id)||'[]'); }catch(e){ return []; }
}
function deleteCmt(id, idx){
  var cmts = getCmts(id);
  var target = cmts[idx];
  if(target && target.ts){
    // Firebaseから削除
    db.ref('comments/' + id + '/' + target.ts).remove();
  }
  cmts.splice(idx, 1);
  localStorage.setItem('cmt_'+id, JSON.stringify(cmts));
}

function saveCmt(id, name, text){
  var ts = Date.now();
  var cmt = {
    name: name||'名無し',
    text: text,
    date: new Date().toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}),
    ts: ts
  };
  // Firebaseに保存
  db.ref('comments/' + id + '/' + ts).set(cmt);
  // localStorageにも同期
  var cmts = getCmts(id);
  cmts.push(cmt);
  localStorage.setItem('cmt_'+id, JSON.stringify(cmts));
}


// 2週間以内にコメントがあるか判定
function hasRecentCmt(id){
  var cmts = getCmts(id);
  if(!cmts.length) return false;
  var twoWeeks = 14 * 24 * 60 * 60 * 1000;
  var now = Date.now();
  return cmts.some(function(c){
    return c.ts && (now - c.ts) < twoWeeks;
  });
}

// ── 近接グロー & シナプス線 ──
var synapseLines = [];
var proxMarkers  = {};  // id -> true
var userPos = null;

function haversineKm(lat1, lng1, lat2, lng2){
  var R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
        Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function updateProximity(lat, lng){
  userPos = {lat:lat, lng:lng};
  // シナプス線をクリア
  synapseLines.forEach(function(l){ mapObj.removeLayer(l); });
  synapseLines = [];
  proxMarkers = {};

  var items = filtered();
  items.forEach(function(r){
    var km = haversineKm(lat, lng, r.lat, r.lng);
    if(km <= 1.0){
      proxMarkers[r.id] = true;
      // シナプス線
      var line = L.polyline([[lat,lng],[r.lat,r.lng]], {
        color: 'rgba(80,160,255,0.55)',
        weight: 2.5,
        className: 'synapse-line',
        interactive: false
      }).addTo(mapObj);
      synapseLines.push(line);
    }
  });
  // マーカーを再描画（近接グロー反映）
  renderMarkers();
}

function startWatchPosition(){
  if(!navigator.geolocation) return;
  navigator.geolocation.watchPosition(
    function(pos){
      var lat=pos.coords.latitude, lng=pos.coords.longitude;
      // 自分ピンを更新
      if(locMarker) mapObj.removeLayer(locMarker);
      var userIcon = L.divIcon({
        className:'',
        html:'<div style="position:relative;width:12px;height:12px;">'+
               '<div class="user-pin-ring"></div>'+
               '<div class="user-pin-ring2"></div>'+
               '<div style="width:12px;height:12px;background:#3C8CFF;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px rgba(60,140,255,0.8);"></div>'+
             '</div>',
        iconSize:[12,12], iconAnchor:[6,6]
      });
      locMarker = L.marker([lat,lng],{icon:userIcon, zIndexOffset:1000})
        .addTo(mapObj).bindPopup('📍 現在地');
      // 近接チェック
      updateProximity(lat, lng);
    },
    function(err){ console.log('位置情報エラー:', err.message); },
    {enableHighAccuracy:true, timeout:15000, maximumAge:10000}
  );
}

function distKm(lat1,lng1,lat2,lng2){
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function clearSynapse(){

  synapseWrapper=null;

function drawSynapse(ulat,ulng,nearItems){
  if(!mapObj)return;
  clearSynapse();
  if(!nearItems.length)return;

  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('style','position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;');

  var defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  // シナプスのダッシュアニメ
  var style=document.createElementNS('http://www.w3.org/2000/svg','style');
  style.textContent='@keyframes sd{0%{stroke-dashoffset:200;opacity:.2}50%{opacity:1}100%{stroke-dashoffset:0;opacity:.2}}@keyframes sp{0%,100%{opacity:.2;r:4}50%{opacity:1;r:8}}';
  defs.appendChild(style);

  nearItems.forEach(function(r,i){
    var delay=(i*0.35)+'s';
    var dist=distKm(ulat,ulng,r.lat,r.lng);
    var alpha=Math.max(0.3,1-dist/1.0);

    var p1=mapObj.latLngToContainerPoint([ulat,ulng]);
    var p2=mapObj.latLngToContainerPoint([r.lat,r.lng]);

    // グラデーション
    var gid='g'+r.id;
    var grad=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
    grad.setAttribute('id',gid);grad.setAttribute('gradientUnits','userSpaceOnUse');
    grad.setAttribute('x1',p1.x);grad.setAttribute('y1',p1.y);grad.setAttribute('x2',p2.x);grad.setAttribute('y2',p2.y);
    var s1=document.createElementNS('http://www.w3.org/2000/svg','stop');
    s1.setAttribute('offset','0%');s1.setAttribute('stop-color','rgba(100,200,255,'+alpha+')');
    var s2=document.createElementNS('http://www.w3.org/2000/svg','stop');
    s2.setAttribute('offset','100%');s2.setAttribute('stop-color','rgba(60,120,255,'+(alpha*0.3)+')');
    grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);

    // 線
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',p1.x);line.setAttribute('y1',p1.y);line.setAttribute('x2',p2.x);line.setAttribute('y2',p2.y);
    line.setAttribute('stroke','url(#'+gid+')');line.setAttribute('stroke-width','2.5');
    line.setAttribute('stroke-dasharray','14 8');line.setAttribute('stroke-linecap','round');
    line.style.animation='sd 1.6s linear '+delay+' infinite';
    svg.appendChild(line);

    // 末端の光の玉
    var circ=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circ.setAttribute('cx',p2.x);circ.setAttribute('cy',p2.y);circ.setAttribute('r','5');
    circ.setAttribute('fill','rgba(120,210,255,.9)');
    circ.style.animation='sp 1.6s ease-in-out '+delay+' infinite';
    svg.appendChild(circ);

    // 共鳴マーカー（青白グロー）
    var rm=L.marker([r.lat,r.lng],{icon:mkIcon(r.t,r.id,true),zIndexOffset:1000}).addTo(mapObj);
    resonanceMarkers.push(rm);
  });

  svg.appendChild(defs);
  var wrapper=document.createElement('div');
  wrapper.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:450;';
  wrapper.appendChild(svg);
  synapseWrapper=wrapper;
  var mapEl=document.getElementById('map');
  mapEl.style.position='relative';
  mapEl.appendChild(wrapper);

  // 地図移動時に再描画
  mapObj.off('moveend zoomend',redrawSynapse);
  mapObj.on('moveend zoomend',redrawSynapse);
}

function redrawSynapse(){
  if(!lastUserPos)return;
  var near=filtered().filter(function(r){return distKm(lastUserPos.lat,lastUserPos.lng,r.lat,r.lng)<=1.0;});
  drawSynapse(lastUserPos.lat,lastUserPos.lng,near);
}

function startResonance(){
  if(!mapObj)return;
  if(watchId!==null)navigator.geolocation.clearWatch(watchId);
  watchId=navigator.geolocation.watchPosition(
    function(pos){
      var ulat=pos.coords.latitude,ulng=pos.coords.longitude;
      lastUserPos={lat:ulat,lng:ulng};
      // 現在地マーカー更新
      if(locMarker)mapObj.removeLayer(locMarker);
      locMarker=L.circleMarker([ulat,ulng],{radius:12,fillColor:'#4A90D9',color:'#fff',weight:3,opacity:1,fillOpacity:0.9}).addTo(mapObj).bindPopup('📍 現在地');
      // 1km圏内のお店
      var near=filtered().filter(function(r){return distKm(ulat,ulng,r.lat,r.lng)<=1.0;});
      drawSynapse(ulat,ulng,near);
    },
    function(err){console.log('位置情報エラー:',err);},
    {enableHighAccuracy:true,maximumAge:10000,timeout:15000}
  );
}

function goToMyLocation(){
  if(!navigator.geolocation){alert('位置情報が利用できません');return;}
  if(!mapObj){initMap();}
  startResonance();
  navigator.geolocation.getCurrentPosition(
    function(pos){ mapObj.setView([pos.coords.latitude, pos.coords.longitude], 15); },
    function(){},
    {timeout:8000,maximumAge:30000}
  );
}
// ── view switch ──
function sv(v){
  curView=v;
  document.getElementById('lv').style.display=v==='list'?'block':'none';
  document.getElementById('mv').style.display=v==='map'?'block':'none';
  document.getElementById('bl').classList.toggle('on',v==='list');
  document.getElementById('bm').classList.toggle('on',v==='map');
  if(v==='map'){initMap();setTimeout(function(){if(mapObj){mapObj.invalidateSize();renderMarkers();}},150);}
}
var chips=document.querySelectorAll('.ch');
for(var ci=0;ci<chips.length;ci++){
  chips[ci].addEventListener('click',function(){
    for(var k=0;k<chips.length;k++)chips[k].classList.remove('on');
    this.classList.add('on');curCat=this.getAttribute('data-c');
    render();if(curView==='map')renderMarkers();
  });
}
document.getElementById('q').addEventListener('input',function(){curQ=this.value;render();if(curView==='map')renderMarkers();});
render();
</script>
