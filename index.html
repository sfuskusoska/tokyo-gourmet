<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>東京グルメマップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  font-family: "Meiryo","Yu Gothic","游ゴシック","Hiragino Sans",sans-serif;
  background:#FAF7F2;
  color:#2A2420;
  /* dvhに非対応のブラウザ向けフォールバック */
  height:100vh;
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
#hd {
  flex-shrink:0;
  background:#fff;
  border-bottom:1px solid #E2D9CE;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  box-shadow:0 1px 3px rgba(100,60,20,.08);
}
#logo { font-size:14px; font-weight:700; color:#2A2420; white-space:nowrap; flex-shrink:0; }
#logo em { font-style:normal; color:#B8622A; }
#q {
  flex:1; min-width:0;
  border:1px solid #E2D9CE; border-radius:20px;
  padding:6px 13px; font-size:13px;
  background:#F3EDE4; color:#2A2420;
  font-family:inherit; outline:none;
}
#q::placeholder { color:#C0B8B0; }
#cnt {
  flex-shrink:0;
  background:#B8622A; color:#fff;
  border-radius:20px; padding:3px 10px;
  font-size:11px; font-weight:700;
}

/* VIEW TOGGLE */
#vt {
  flex-shrink:0;
  background:#fff; border-bottom:1px solid #E2D9CE;
  display:flex; gap:8px; align-items:center;
  padding:7px 14px;
}
.vb {
  border:1.5px solid #CFC6BB; border-radius:8px;
  padding:5px 14px; font-size:12px; font-weight:700;
  background:#F3EDE4; color:#8A7F76;
  cursor:pointer; font-family:inherit;
}
.vb.on { background:#B8622A; border-color:#B8622A; color:#fff; }

/* FILTER BAR */
#fb {
  flex-shrink:0;
  background:#fff; border-bottom:1px solid #E2D9CE;
  display:flex; gap:6px; align-items:center;
  padding:7px 10px;
  overflow-x:auto; overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
}
#fb::-webkit-scrollbar { display:none; }
.ch {
  flex-shrink:0;
  border:1.5px solid #E2D9CE; border-radius:20px;
  padding:4px 11px; font-size:12px; font-weight:500;
  background:#F3EDE4; color:#8A7F76;
  cursor:pointer; white-space:nowrap; font-family:inherit;
  user-select:none; -webkit-user-select:none;
}
.ch.on { background:#B8622A; border-color:#B8622A; color:#fff; }

/* MAIN - flex:1 で残りの高さを取る */
#mn {
  flex:1;
  position:relative;
  min-height:0;
  overflow:hidden;
}

/* LIST - inset の代わりに top/left/right/bottom を明示 */
#lv {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:10px 12px 30px;
}

/* MAP - inset の代わりに top/left/right/bottom を明示 */
#mv {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  display:none;
}
#map { width:100%; height:100%; }

/* Leaflet popup */
.leaflet-popup-content-wrapper {
  background:#fff !important;
  border:1px solid #E2D9CE !important;
  border-radius:10px !important;
  color:#2A2420 !important;
  box-shadow:0 4px 16px rgba(80,40,10,.15) !important;
}
.leaflet-popup-tip { background:#fff !important; }
.leaflet-popup-close-button { color:#8A7F76 !important; }
.pp-lk {
  display:block; text-align:center; background:#B8622A; color:#fff;
  border-radius:6px; padding:7px; font-size:11px; font-weight:700; text-decoration:none;
}
</style>
</head>
<body>

<div id="hd">
  <div id="logo">🗾 東京<em>グルメ</em>マップ</div>
  <input id="q" type="text" placeholder="店名・エリア・番組で検索…">
  <div id="cnt">0件</div>
</div>

<div id="vt">
  <button class="vb on" id="bl" onclick="sv('list')">📋 リスト</button>
  <button class="vb"    id="bm" onclick="sv('map')">🗺 地図</button>
</div>

<div id="fb">
  <div class="ch on" data-c="all">🗺 すべて</div>
  <div class="ch" data-c="youshoku">🍳 洋食・定食</div>
  <div class="ch" data-c="machichuka">🥟 町中華・台湾</div>
  <div class="ch" data-c="izakaya">🍺 居酒屋・コの字</div>
  <div class="ch" data-c="motsu">🔥 もつ焼き</div>
  <div class="ch" data-c="ramen">🍜 ラーメン</div>
  <div class="ch" data-c="curry">🍛 カレー</div>
  <div class="ch" data-c="sushi">🐟 寿司・海鮮</div>
  <div class="ch" data-c="yakiniku">🥩 焼肉</div>
  <div class="ch" data-c="korean">🇰🇷 コリアン</div>
  <div class="ch" data-c="cafe">☕ 甘味・喫茶</div>
  <div class="ch" data-c="kodoku">🎬 孤独のグルメ</div>
  <div class="ch" data-c="sakaba">🍶 酒場放浪記</div>
  <div class="ch" data-c="drama">📺 コの字・町中華ドラマ</div>
</div>

<div id="mn">
  <div id="lv"></div>
  <div id="mv"><div id="map"></div></div>
</div>

  {id:20, n:'萬福',               a:'銀座',             t:'machichuka', lat:35.6720, lng:139.7649, d:'銀座に佇む老舗町中華。番組フェス出店店舗。銀座という立地でリーズナブルに食べられる貴重な一軒。',                                                                                                                                                               h:'11:00〜21:30 日曜定休',                    b:'〜2,000円',      s:['町中華で飲ろうぜ'],                         u:'https://tabelog.com/tokyo/A1301/A130101/13002213/'},
  {id:21, n:'好又香',             a:'神田',             t:'machichuka', lat:35.6944, lng:139.7683, d:'プロが東京で一番通いたいと評する町中華の名店。何を食べても美味しいと言われる安定感。常連の支持が厚く、平日でも11:30には満席。',                                                                                                                            h:'11:30〜14:00/17:00〜20:00 土日定休',       b:'〜1,500円',      s:['プロ御用達'],                               u:''},

  {id:32, n:'宝泉',               a:'王子',             t:'izakaya',    lat:35.7574, lng:139.7368, d:'赤提灯に縄のれん。コの字カウンターが2つある「ダブルデッカー」構造の名酒場。今夜はコの字で・酒場放浪記に登場。地元常連で賑わう。',                                                                                                                          h:'17:00〜22:30 日月定休',                    b:'2,000〜3,000円', s:['今夜はコの字で','酒場放浪記'],              u:''},

function filtered(){
  return D.filter(function(r){
    var ok1 = (curCat==='all' || r.t===curCat);
    var q = curQ.trim().toLowerCase();
    var ok2 = !q || r.n.toLowerCase().indexOf(q)>=0 || r.a.toLowerCase().indexOf(q)>=0 ||
              r.s.some(function(x){ return x.toLowerCase().indexOf(q)>=0; });
    return ok1 && ok2;
  });
}

// ── card builder using createElement (no innerHTML for Japanese text) ──
function makeCard(r){
  var cat = CAT[r.t] || {l:r.t, i:'📍', c:'#888'};

  // CARD wrapper
  var card = document.createElement('div');
  card.style.cssText = 'background:#fff;border:1.5px solid #E2D9CE;border-radius:10px;overflow:hidden;margin-bottom:8px;box-shadow:0 1px 3px rgba(100,60,20,.08);';

  // TOP
  var top = document.createElement('div');
  top.style.cssText = 'display:flex;align-items:flex-start;gap:10px;padding:12px 14px 8px;';

  var ic = document.createElement('span');
  ic.textContent = cat.i;
  ic.style.cssText = 'font-size:22px;flex-shrink:0;line-height:1.3;margin-top:1px;';
  top.appendChild(ic);

  var body = document.createElement('div');
  body.style.cssText = 'flex:1;min-width:0;';

  var nm = document.createElement('div');
  nm.textContent = r.n;
  nm.style.cssText = 'font-size:15px;font-weight:bold;color:#2A2420;margin-bottom:5px;line-height:1.4;';
  body.appendChild(nm);

  var row1 = document.createElement('div');
  row1.style.cssText = 'display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;';

  var ar = document.createElement('span');
  ar.textContent = '📍 ' + r.a;
  ar.style.cssText = 'font-size:12px;color:#8A7F76;';
  row1.appendChild(ar);

  var ct = document.createElement('span');
  ct.textContent = cat.l;
  ct.style.cssText = 'font-size:10px;font-weight:bold;padding:2px 8px;border-radius:10px;background:#F5E6D8;color:#B8622A;border:1px solid #E8C8A8;';
  row1.appendChild(ct);
  body.appendChild(row1);

  // source tags
  var tgRow = document.createElement('div');
  tgRow.style.cssText = 'display:flex;gap:5px;flex-wrap:wrap;';
  var maxS = Math.min(r.s.length, 3);
  for(var k=0; k<maxS; k++){
    var tg = document.createElement('span');
    tg.textContent = r.s[k];
    tg.style.cssText = 'font-size:10px;padding:2px 7px;border-radius:10px;background:#F3EDE4;color:#8A7F76;border:1px solid #E2D9CE;';
    tgRow.appendChild(tg);
  }
  body.appendChild(tgRow);
  top.appendChild(body);
  card.appendChild(top);

  // FOOTER (buttons)
  var ft = document.createElement('div');
  ft.style.cssText = 'display:flex;align-items:center;padding:0 14px 10px;';

  var dtBtn = document.createElement('button');
  dtBtn.style.cssText = 'background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:bold;color:#B8622A;display:flex;align-items:center;gap:3px;padding:0;';
  var dtTxt = document.createElement('span');
  dtTxt.textContent = '詳細を見る ';
  var dtArr = document.createElement('span');
  dtArr.textContent = '▼';
  dtArr.style.cssText = 'font-size:9px;display:inline-block;transition:transform .2s;';
  dtBtn.appendChild(dtTxt);
  dtBtn.appendChild(dtArr);
  ft.appendChild(dtBtn);

  var mpBtn = document.createElement('button');
  mpBtn.textContent = '🗺 地図で見る';
  mpBtn.style.cssText = 'margin-left:auto;background:none;border:none;cursor:pointer;font-family:inherit;font-size:11px;color:#8A7F76;padding:0;';
  ft.appendChild(mpBtn);
  card.appendChild(ft);

  // DETAIL PANEL
  var dp = document.createElement('div');
  dp.style.cssText = 'display:none;background:#FAF7F2;border-top:1.5px solid #E2D9CE;padding:12px 14px 14px;';

  var desc = document.createElement('div');
  desc.textContent = r.d;
  desc.style.cssText = 'font-size:12px;color:#6A625A;line-height:1.8;margin-bottom:10px;';
  dp.appendChild(desc);

  if(r.h){
    var hrow = document.createElement('div');
    hrow.style.cssText = 'display:flex;gap:8px;font-size:12px;margin-bottom:5px;';
    var hic = document.createElement('span'); hic.textContent='⏰'; hic.style.color='#B0A8A0'; hic.style.flexShrink='0';
    var hvl = document.createElement('span'); hvl.textContent=r.h; hvl.style.color='#2A2420'; hvl.style.lineHeight='1.5';
    hrow.appendChild(hic); hrow.appendChild(hvl);
    dp.appendChild(hrow);
  }
  if(r.b){
    var brow = document.createElement('div');
    brow.style.cssText = 'display:flex;gap:8px;font-size:12px;margin-bottom:10px;';
    var bic = document.createElement('span'); bic.textContent='💴'; bic.style.color='#B0A8A0'; bic.style.flexShrink='0';
    var bvl = document.createElement('span'); bvl.textContent=r.b; bvl.style.color='#2A2420'; bvl.style.lineHeight='1.5';
    brow.appendChild(bic); brow.appendChild(bvl);
    dp.appendChild(brow);
  }
  if(r.u){
    var lnk = document.createElement('a');
    lnk.textContent = '🔗 食べログで見る';
    lnk.href = r.u;
    lnk.target = '_blank';
    lnk.rel = 'noopener';
    lnk.style.cssText = 'display:inline-flex;align-items:center;gap:5px;background:#B8622A;color:#fff;border-radius:7px;padding:7px 16px;font-size:12px;font-weight:bold;text-decoration:none;';
    dp.appendChild(lnk);
  } else {
    var noLnk = document.createElement('span');
    noLnk.textContent = '食べログリンク準備中';
    noLnk.style.cssText = 'font-size:11px;color:#B0A8A0;';
    dp.appendChild(noLnk);
  }
  card.appendChild(dp);

  // Events
  var isOpen = false;
  dtBtn.onclick = function(){
    isOpen = !isOpen;
    dp.style.display = isOpen ? 'block' : 'none';
    dtArr.style.transform = isOpen ? 'rotate(180deg)' : '';
  };
  var lat=r.lat, lng=r.lng;
  mpBtn.onclick = function(){
    sv('map');
    setTimeout(function(){ if(mapObj) mapObj.setView([lat,lng],16); }, 200);
  };

  return card;
}

// ── render ──
function render(){
  var lv = document.getElementById('lv');
  // clear
  while(lv.firstChild) lv.removeChild(lv.firstChild);

  var items = filtered();
  document.getElementById('cnt').textContent = items.length + '件';

  if(!items.length){
    var em = document.createElement('div');
    em.style.cssText = 'padding:60px 20px;text-align:center;color:#B0A8A0;font-size:14px;';
    em.textContent = '🔍 該当するお店が見つかりませんでした';
    lv.appendChild(em);
    return;
  }

  var frag = document.createDocumentFragment();
  for(var i=0; i<items.length; i++){
    frag.appendChild(makeCard(items[i]));
  }
  lv.appendChild(frag);
}

// ── map ──
function initMap(){
  if(mapReady) return;
  mapReady = true;
  mapObj = L.map('map', {center:[35.690,139.745], zoom:12});
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
    {attribution:'Tiles &copy; Esri', maxZoom:17}
  ).addTo(mapObj);
  renderMarkers();
}

function mkIcon(t){
  var c = CAT[t] || {i:'📍', c:'#888'};
  return L.divIcon({
    className:'',
    html:'<div style="background:'+c.c+';width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(255,255,255,.9);box-shadow:0 2px 6px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:14px;line-height:1;">'+c.i+'</span></div>',
    iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-34]
  });
}

function renderMarkers(){
  if(!mapObj) return;
  for(var i=0;i<mapMs.length;i++) mapObj.removeLayer(mapMs[i]);
  mapMs = [];
  var items = filtered();
  for(var j=0;j<items.length;j++){
    var r = items[j];
    var c = CAT[r.t] || {l:r.t};
    var ds = r.d.length>80 ? r.d.substring(0,80)+'…' : r.d;
    var tl = r.u ? '<a class="pp-lk" href="'+r.u+'" target="_blank" rel="noopener">🔗 食べログ</a>' : '';
    var pop = '<div style="font-size:14px;font-weight:bold;color:#2A2420;margin-bottom:3px;">'+r.n+'</div>'+
              '<div style="font-size:11px;color:#8A7F76;margin-bottom:5px;">📍 '+r.a+'</div>'+
              '<span style="font-size:10px;font-weight:bold;padding:2px 7px;border-radius:10px;background:#F5E6D8;color:#B8622A;display:inline-block;margin-bottom:7px;">'+c.l+'</span>'+
              '<div style="font-size:11px;color:#6A625A;line-height:1.6;margin-bottom:8px;">'+ds+'</div>'+tl;
    var m = L.marker([r.lat,r.lng],{icon:mkIcon(r.t)})
      .bindPopup(pop,{maxWidth:240}).addTo(mapObj);
    mapMs.push(m);
  }
}

// ── view switch ──
function sv(v){
  curView = v;
  document.getElementById('lv').style.display = v==='list' ? 'block' : 'none';
  document.getElementById('mv').style.display = v==='map'  ? 'block' : 'none';
  document.getElementById('bl').classList.toggle('on', v==='list');
  document.getElementById('bm').classList.toggle('on', v==='map');
  if(v==='map'){
    initMap();
    setTimeout(function(){ if(mapObj){ mapObj.invalidateSize(); renderMarkers(); } }, 150);
  }
}

// ── chips ──
var chips = document.querySelectorAll('.ch');
for(var ci=0; ci<chips.length; ci++){
  chips[ci].addEventListener('click', function(){
    for(var k=0;k<chips.length;k++) chips[k].classList.remove('on');
    this.classList.add('on');
    curCat = this.getAttribute('data-c');
    render();
    if(curView==='map') renderMarkers();
  });
}

// ── search ──
document.getElementById('q').addEventListener('input', function(){
  curQ = this.value;
  render();
  if(curView==='map') renderMarkers();
});

// ── INIT ──
render();
</script>
</body>
</html>
