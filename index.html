<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>東京グルメマップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{font-family:"Meiryo","Yu Gothic","Hiragino Sans",sans-serif;background:#FAF7F2;color:#2A2420;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
#hd{flex-shrink:0;background:#fff;border-bottom:1px solid #E2D9CE;display:flex;align-items:center;gap:10px;padding:10px 14px;box-shadow:0 1px 3px rgba(100,60,20,.08);}
#logo{font-size:13px;font-weight:700;color:#2A2420;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px;}
#logo em{font-style:normal;color:#B8622A;}
#fuku{display:inline-block;transform:rotate(-18deg);transform-origin:center bottom;animation:fuku-bounce 3s ease-in-out infinite;line-height:1;}
@keyframes fuku-bounce{0%,100%{transform:rotate(-18deg) translateY(0);}50%{transform:rotate(-15deg) translateY(-2px);}}
#q{flex:1;min-width:0;border:1px solid #E2D9CE;border-radius:20px;padding:6px 13px;font-size:13px;background:#F3EDE4;color:#2A2420;font-family:inherit;outline:none;}
#q::placeholder{color:#C0B8B0;}
#cnt{flex-shrink:0;background:#B8622A;color:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
#vt{flex-shrink:0;background:#fff;border-bottom:1px solid #E2D9CE;display:flex;gap:8px;align-items:center;padding:7px 14px;}
.vb{border:1.5px solid #CFC6BB;border-radius:8px;padding:5px 14px;font-size:12px;font-weight:700;background:#F3EDE4;color:#8A7F76;cursor:pointer;font-family:inherit;}
.vb.on{background:#B8622A;border-color:#B8622A;color:#fff;}
#fb{flex-shrink:0;background:#fff;border-bottom:1px solid #E2D9CE;display:flex;gap:6px;align-items:center;padding:7px 10px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;}
#fb::-webkit-scrollbar{display:none;}
.ch{flex-shrink:0;border:1.5px solid #E2D9CE;border-radius:20px;padding:4px 11px;font-size:12px;font-weight:500;background:#F3EDE4;color:#8A7F76;cursor:pointer;white-space:nowrap;font-family:inherit;user-select:none;}
.ch.on{background:#B8622A;border-color:#B8622A;color:#fff;}
#mn{flex:1;position:relative;min-height:0;overflow:hidden;}
#lv{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px 12px 30px;}
#mv{position:absolute;top:0;left:0;right:0;bottom:0;display:none;}
#map{width:100%;height:100%;}
/* 地図読み込み注意書き */
#map-notice{position:absolute;top:0;left:0;right:0;z-index:1000;background:#FFF8F0;border-bottom:1px solid #E8C8A8;padding:8px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#8A5020;}
#map-notice-close{margin-left:auto;font-size:18px;cursor:pointer;color:#B8622A;padding:0 4px;line-height:1;}
/* ローディング */
#map-loading{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(250,247,242,.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:12px;font-size:13px;color:#8A7F76;}
.spinner{width:32px;height:32px;border:3px solid #E2D9CE;border-top-color:#B8622A;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* 現在地ボタン */
#loc-btn{position:absolute;bottom:80px;right:12px;z-index:1000;width:42px;height:42px;background:#fff;border:1.5px solid #E2D9CE;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(80,40,10,.15);}

/* Leaflet divIcon デフォルトリセット */
.pin-wrap {
  background: transparent !important;
  border: none !important;
  overflow: visible !important;
}
.leaflet-div-icon {
  background: transparent !important;
  border: none !important;
}

/* Leaflet popup */
.leaflet-popup-content-wrapper{background:#fff!important;border:1px solid #E2D9CE!important;border-radius:10px!important;color:#2A2420!important;box-shadow:0 4px 16px rgba(80,40,10,.15)!important;}
.leaflet-popup-tip{background:#fff!important;}
.leaflet-popup-close-button{color:#8A7F76!important;}
.pp-lk{display:block;text-align:center;background:#B8622A;color:#fff;border-radius:6px;padding:6px;font-size:11px;font-weight:700;text-decoration:none;margin-bottom:5px;}
.pp-list-btn{display:block;text-align:center;background:#F3EDE4;color:#B8622A;border-radius:6px;padding:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #E8C8A8;margin-top:5px;}
/* MarkerCluster */
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background-color:rgba(184,98,42,.25)!important;}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background-color:rgba(184,98,42,.7)!important;color:#fff!important;font-weight:700!important;}

/* ── シャボン玉アニメーション ── */
#bubble-stage {
  position:fixed; left:0; top:0; width:100%; height:100%;
  pointer-events:none; z-index:9999; overflow:hidden;
}
.bubble {
  position:absolute;
  border-radius:16px;
  display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-start;
  text-align:left; font-size:12px; font-weight:500;
  line-height:1.6; padding:12px 14px;
  animation: bubble-rise linear forwards;
  pointer-events:none;
  will-change: transform, opacity;
  min-width:160px; max-width:220px;
  word-break:break-all;
}
@keyframes bubble-rise {
  0%   { transform:translateY(0) scale(0.5) translateX(0);      opacity:0; }
  8%   { transform:translateY(-35px) scale(1) translateX(0);    opacity:1; }
  30%  { transform:translateY(-180px) scale(1) translateX(10px);opacity:1; }
  60%  { transform:translateY(-360px) scale(1) translateX(-8px);opacity:1; }
  85%  { transform:translateY(-520px) scale(1) translateX(5px); opacity:0.8; }
  95%  { transform:translateY(-580px) scale(1) translateX(0);   opacity:0.2; }
  100% { transform:translateY(-620px) scale(1) translateX(0);   opacity:0; }
}

/* ── コメント入力パネル ── */
.cmt-section {
  border-top:1px dashed #E2D9CE;
  padding:10px 0 0;
  margin-top:8px;
}
.cmt-section-title {
  font-size:11px; font-weight:700; color:#8A7F76; margin-bottom:8px;
}
.cmt-list { display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
.cmt-item {
  background:#FFFBF5; border:1px solid #E8D8C8; border-radius:8px;
  padding:7px 10px; font-size:12px;
}
.cmt-item-header { display:flex; justify-content:space-between; margin-bottom:3px; }
.cmt-item-name { font-weight:700; color:#B8622A; font-size:11px; }
.cmt-item-date { font-size:10px; color:#B0A8A0; }
.cmt-item-text { color:#2A2420; line-height:1.6; }
.cmt-form { display:flex; flex-direction:column; gap:5px; }
.cmt-input-name {
  border:1px solid #E2D9CE; border-radius:8px; padding:6px 10px;
  font-size:12px; background:#FDFAF6; font-family:inherit; outline:none;
  color:#2A2420;
}
.cmt-input-text {
  border:1px solid #E2D9CE; border-radius:8px; padding:6px 10px;
  font-size:12px; background:#FDFAF6; font-family:inherit; outline:none;
  resize:none; height:54px; color:#2A2420;
}
.cmt-submit {
  background:#B8622A; color:#fff; border:none; border-radius:8px;
  padding:7px 14px; font-size:12px; font-weight:700; cursor:pointer;
  font-family:inherit; align-self:flex-end;
}
.cmt-submit:active { background:#9A4E1E; }


/* ── キラキラ・グロー・シナプスアニメーション ── */
@keyframes pin-glow {
  0%,100% { box-shadow:0 0 8px 3px rgba(255,210,60,0.8),0 0 18px 6px rgba(255,170,0,0.5),0 2px 6px rgba(0,0,0,0.3); }
  50%      { box-shadow:0 0 18px 8px rgba(255,235,80,1),0 0 36px 14px rgba(255,200,0,0.7),0 2px 6px rgba(0,0,0,0.3); }
}
@keyframes sparkle {
  0%,100% { opacity:0; transform:scale(0.3) rotate(0deg); }
  50%      { opacity:1; transform:scale(1.2) rotate(180deg); }
}
@keyframes resonance-glow {
  0%,100% { box-shadow:0 0 12px 5px rgba(100,200,255,0.8),0 0 24px 10px rgba(60,160,255,0.5); }
  50%      { box-shadow:0 0 22px 10px rgba(140,220,255,1),0 0 44px 18px rgba(80,180,255,0.7); }
}
@keyframes synapse-dash {
  0%   { stroke-dashoffset: 200; opacity:0.3; }
  50%  { opacity:1; }
  100% { stroke-dashoffset: 0;   opacity:0.3; }
}
@keyframes synapse-pulse {
  0%,100% { opacity:0.2; r:4; }
  50%     { opacity:1;   r:7; }
}

/* ── キラキラ（コメント2週間以内）：ゆっくり金色に輝く ── */
@keyframes pin-ring-pulse {
  0%   { transform:scale(1);   opacity:0.7; }
  70%  { transform:scale(2.4); opacity:0.0; }
  100% { transform:scale(2.4); opacity:0.0; }
}
@keyframes pin-ring-pulse2 {
  0%,25% { transform:scale(1);   opacity:0.5; }
  85%    { transform:scale(2.8); opacity:0.0; }
  100%   { transform:scale(2.8); opacity:0.0; }
}
.pin-wrap { position:relative; }
.pin-ring {
  position:absolute;
  width:32px; height:32px;
  border-radius:50%;
  top:3px; left:3px;
  background:rgba(255,200,40,0.5);
  animation: pin-ring-pulse 4s ease-out infinite;
  pointer-events:none;
}
.pin-ring2 {
  position:absolute;
  width:32px; height:32px;
  border-radius:50%;
  top:3px; left:3px;
  background:rgba(255,160,0,0.30);
  animation: pin-ring-pulse2 4s ease-out 1.5s infinite;
  pointer-events:none;
}

/* ── 近接グロー（1km以内）：ゆっくり青く輝く ── */
@keyframes prox-glow {
  0%,100% { box-shadow:0 0 6px 2px rgba(80,160,255,0.7), 0 0 16px 5px rgba(40,100,255,0.35); }
  50%     { box-shadow:0 0 14px 6px rgba(120,200,255,0.9), 0 0 30px 12px rgba(60,140,255,0.55); }
}
@keyframes prox-ring {
  0%   { transform:scale(1);   opacity:0.7; }
  100% { transform:scale(3.2); opacity:0.0; }
}
.pin-prox-ring {
  position:absolute;
  width:32px; height:32px;
  border-radius:50%;
  top:3px; left:3px;
  background:rgba(80,160,255,0.3);
  animation: prox-ring 5s ease-out infinite;
  pointer-events:none;
}
.pin-prox {
  box-shadow:0 0 10px 3px rgba(80,160,255,0.8),
             0 0 20px 7px rgba(40,100,255,0.45) !important;
  animation: prox-glow 3s ease-in-out infinite !important;
}

/* ── シナプス線（Leaflet SVG polyline） ── */
.synapse-line {
  stroke-dasharray: 14, 10;
  animation: synapse-dash 2.5s linear infinite;
}
@keyframes synapse-dash {
  to { stroke-dashoffset: -24; }
}

/* ── 自分ピン ── */
@keyframes user-ping {
  0%   { transform:scale(1);   opacity:0.8; }
  100% { transform:scale(3.8); opacity:0.0; }
}
.user-pin-ring {
  position:absolute;
  width:20px; height:20px;
  border-radius:50%;
  top:-4px; left:-4px;
  background:rgba(60,140,255,0.4);
  animation: user-ping 4s ease-out infinite;
  pointer-events:none;
}
.user-pin-ring2 {
  position:absolute;
  width:20px; height:20px;
  border-radius:50%;
  top:-4px; left:-4px;
  background:rgba(60,140,255,0.22);
  animation: user-ping 4s ease-out 1.8s infinite;
  pointer-events:none;
}

</style>
</head>

var curCat='all',curQ='',curView='list';

function filtered(){
  return D.filter(function(r){
    var ok1=(curCat==='all'||r.t===curCat);
    var q=curQ.trim().toLowerCase();
    var ok2=!q||r.n.toLowerCase().indexOf(q)>=0||r.a.toLowerCase().indexOf(q)>=0||r.s.some(function(x){return x.toLowerCase().indexOf(q)>=0;});
    return ok1&&ok2;
  });
}

function jumpToList(id){
  sv('list');
  setTimeout(function(){
    var card=document.getElementById('card-'+id);
    if(!card)return;
    card.scrollIntoView({behavior:'smooth',block:'start'});
    var dp=document.getElementById('dp-'+id);
    var arr=document.getElementById('arr-'+id);
    if(dp&&dp.style.display==='none'){
      dp.style.display='block';
      if(arr)arr.style.transform='rotate(180deg)';
    }
  },150);
}

function render(){
  var lv=document.getElementById('lv');
  while(lv.firstChild)lv.removeChild(lv.firstChild);
  var items=filtered();
  document.getElementById('cnt').textContent=items.length+'件';
  if(!items.length){var em=document.createElement('div');em.style.cssText='padding:60px 20px;text-align:center;color:#B0A8A0;font-size:14px;';em.textContent='🔍 該当するお店が見つかりませんでした';lv.appendChild(em);return;}
  var frag=document.createDocumentFragment();
  for(var i=0;i<items.length;i++)frag.appendChild(makeCard(items[i]));
  lv.appendChild(frag);
}
// ── マップ ──
function initMap(){
  if(mapReady)return;
  mapReady=true;
  var loading=document.getElementById('map-loading');
  loading.style.display='flex';
  mapObj=L.map('map',{center:[35.690,139.745],zoom:12});
  var tile=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',{attribution:'Tiles &copy; Esri',maxZoom:17,keepBuffer:4}).addTo(mapObj);
  tile.on('load',function(){loading.style.display='none';});
  setTimeout(function(){loading.style.display='none';},6000);
  clusterGroup=L.markerClusterGroup({chunkedLoading:true,chunkInterval:50,maxClusterRadius:50,showCoverageOnHover:false});
  mapObj.addLayer(clusterGroup);
  document.getElementById('loc-btn').style.display='flex';
  renderMarkers();
}
function mkIcon(t, id, resonating){
  var c = CAT[t] || {i:'📍', c:'#888'};
  var hot = id && hasRecentCmt(id);
  var sparks = '';
  var pinStyle = 'position:absolute;bottom:0;left:3px;background:' + c.c + ';width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;transition:box-shadow .3s;';

  if(resonating) {
    // 共鳴グロー（青白い光）
    pinStyle += 'animation:resonance-glow 1.2s ease-in-out infinite;';
  } else if(hot) {
    // 最近コメントあり（金色キラキラ）
    pinStyle += 'animation:pin-glow 1.8s ease-in-out infinite;';
    sparks =
      '<div style="position:absolute;top:-6px;left:22px;width:8px;height:8px;background:radial-gradient(circle,#fff 0%,#FFD700 50%,transparent 100%);border-radius:50%;animation:sparkle 1.4s ease-in-out 0s infinite;"></div>' +
      '<div style="position:absolute;top:1px;left:29px;width:5px;height:5px;background:radial-gradient(circle,#fff 0%,#FFD700 50%,transparent 100%);border-radius:50%;animation:sparkle 1.4s ease-in-out 0.5s infinite;"></div>' +
      '<div style="position:absolute;top:-9px;left:12px;width:6px;height:6px;background:radial-gradient(circle,#fff 0%,#FFD700 50%,transparent 100%);border-radius:50%;animation:sparkle 1.4s ease-in-out 0.9s infinite;"></div>';
  } else {
    pinStyle += 'box-shadow:0 2px 6px rgba(0,0,0,.35);';
  }

  var inner = '<div style="' + pinStyle + '"><span style="transform:rotate(45deg);font-size:14px;line-height:1;">' + c.i + '</span></div>';
  return L.divIcon({
    className: '',
    html: '<div style="position:relative;width:38px;height:38px;">' + sparks + inner + '</div>',
    iconSize: [38,38], iconAnchor: [19,38], popupAnchor: [0,-40]
  });
}
function renderMarkers(){
  if(!mapObj||!clusterGroup)return;
  clusterGroup.clearLayers();
  var items=filtered();
  for(var j=0;j<items.length;j++){
    var r=items[j];
    var c=CAT[r.t]||{l:r.t};
    var ds=r.d.length>70?r.d.substring(0,70)+'…':r.d;
    var tl=r.u?'<a class="pp-lk" href="'+r.u+'" target="_blank" rel="noopener">🔗 食べログ</a>':'';
    var rid=r.id;
    var pop='<div style="font-size:14px;font-weight:bold;color:#2A2420;margin-bottom:3px;">'+r.n+'</div>'+
      '<div style="font-size:11px;color:#8A7F76;margin-bottom:5px;">📍 '+r.a+'</div>'+
      '<span style="font-size:10px;font-weight:bold;padding:2px 7px;border-radius:10px;background:#F5E6D8;color:#B8622A;display:inline-block;margin-bottom:7px;">'+c.l+'</span>'+
      '<div style="font-size:11px;color:#6A625A;line-height:1.6;margin-bottom:8px;">'+ds+'</div>'+
      '<button style="display:block;width:100%;text-align:center;background:#B8622A;color:#fff;border:none;border-radius:6px;padding:7px;font-size:11px;font-weight:bold;cursor:pointer;margin-bottom:5px;" onclick="launchBubbles('+rid+')">🫧 コメントを浮かせる</button>'+
      '<button style="display:block;width:100%;text-align:center;background:#8A7F76;color:#fff;border:none;border-radius:6px;padding:7px;font-size:11px;font-weight:bold;cursor:pointer;margin-bottom:5px;" onclick="jumpToList('+rid+')">📋 リストで詳細を見る</button>'+
      tl;
    var m=L.marker([r.lat,r.lng],{icon:mkIcon(r.t, r.id, false)}).bindPopup(pop,{maxWidth:240});
    clusterGroup.addLayer(m);
  }
}

// ── コメント管理 ──
function getCmts(id){
  try{ return JSON.parse(localStorage.getItem('cmt_'+id)||'[]'); }catch(e){ return []; }
}
function deleteCmt(id, idx){
  var cmts = getCmts(id);
  cmts.splice(idx, 1);
  localStorage.setItem('cmt_'+id, JSON.stringify(cmts));
}

function saveCmt(id, name, text){
  var cmts = getCmts(id);
  cmts.push({ name: name||'名無し', text: text, date: new Date().toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}), ts: Date.now() });
  localStorage.setItem('cmt_'+id, JSON.stringify(cmts));
}


// 2週間以内にコメントがあるか判定
function hasRecentCmt(id){
  var cmts = getCmts(id);
  if(!cmts.length) return false;
  var twoWeeks = 14 * 24 * 60 * 60 * 1000;
  var now = Date.now();
  return cmts.some(function(c){
    return c.ts && (now - c.ts) < twoWeeks;
  });
}

// ── シャボン玉エフェクト ──
var BUBBLE_COLORS = [
  { bg:'rgba(200,230,255,0.82)', border:'rgba(120,180,255,0.6)', text:'#1a4a7a' },
  { bg:'rgba(255,220,200,0.82)', border:'rgba(220,140,80,0.6)',  text:'#7a3010' },
  { bg:'rgba(220,255,220,0.82)', border:'rgba(100,180,100,0.6)', text:'#1a5a1a' },
  { bg:'rgba(255,230,255,0.82)', border:'rgba(180,100,200,0.6)', text:'#5a1a7a' },
  { bg:'rgba(255,255,200,0.82)', border:'rgba(180,160,60,0.6)',  text:'#5a4a00' },
];

function launchBubbles(id){
  var cmts = getCmts(id);
  if(!cmts.length) return;
  var stage = document.getElementById('bubble-stage');
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var dur = 10; // 10秒表示

  cmts.slice(-5).forEach(function(c, i){
    setTimeout(function(){
      var col = BUBBLE_COLORS[i % BUBBLE_COLORS.length];
      var cardW = Math.min(220, vw - 40);
      var maxX = Math.max(20, vw - cardW - 20);
      var x = 20 + Math.floor(Math.random() * maxX);

      var b = document.createElement('div');
      b.className = 'bubble';
      b.style.cssText = [
        'width:'+cardW+'px',
        'left:'+x+'px',
        'top:'+(vh + 10)+'px',
        'background:'+col.bg,
        'border:2px solid '+col.border,
        'color:'+col.text,
        'box-shadow:0 4px 16px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.6)',
        'animation-duration:'+dur+'s',
      ].join(';');

      // 名前ラベル
      var nameEl = document.createElement('div');
      nameEl.textContent = c.name;
      nameEl.style.cssText = 'font-size:10px;font-weight:700;opacity:0.75;margin-bottom:4px;';
      b.appendChild(nameEl);

      // コメント全文
      var textEl = document.createElement('div');
      textEl.textContent = c.text;
      textEl.style.cssText = 'font-size:12px;font-weight:600;line-height:1.6;word-break:break-all;';
      b.appendChild(textEl);

      // 日付
      var dateEl = document.createElement('div');
      dateEl.textContent = c.date;
      dateEl.style.cssText = 'font-size:10px;opacity:0.6;margin-top:5px;align-self:flex-end;';
      b.appendChild(dateEl);

      stage.appendChild(b);
      setTimeout(function(){ if(b.parentNode) b.parentNode.removeChild(b); }, dur*1000+300);
    }, i*600);
  });
}


// ── 近接グロー & シナプス線 ──
var synapseLines = [];
var proxMarkers  = {};  // id -> true
var userPos = null;

function haversineKm(lat1, lng1, lat2, lng2){
  var R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
        Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function updateProximity(lat, lng){
  userPos = {lat:lat, lng:lng};
  // シナプス線をクリア
  synapseLines.forEach(function(l){ mapObj.removeLayer(l); });
  synapseLines = [];
  proxMarkers = {};

  var items = filtered();
  items.forEach(function(r){
    var km = haversineKm(lat, lng, r.lat, r.lng);
    if(km <= 1.0){
      proxMarkers[r.id] = true;
      // シナプス線
      var line = L.polyline([[lat,lng],[r.lat,r.lng]], {
        color: 'rgba(80,160,255,0.55)',
        weight: 2.5,
        className: 'synapse-line',
        interactive: false
      }).addTo(mapObj);
      synapseLines.push(line);
    }
  });
  // マーカーを再描画（近接グロー反映）
  renderMarkers();
}

function startWatchPosition(){
  if(!navigator.geolocation) return;
  navigator.geolocation.watchPosition(
    function(pos){
      var lat=pos.coords.latitude, lng=pos.coords.longitude;
      // 自分ピンを更新
      if(locMarker) mapObj.removeLayer(locMarker);
      var userIcon = L.divIcon({
        className:'',
        html:'<div style="position:relative;width:12px;height:12px;">'+
               '<div class="user-pin-ring"></div>'+
               '<div class="user-pin-ring2"></div>'+
               '<div style="width:12px;height:12px;background:#3C8CFF;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px rgba(60,140,255,0.8);"></div>'+
             '</div>',
        iconSize:[12,12], iconAnchor:[6,6]
      });
      locMarker = L.marker([lat,lng],{icon:userIcon, zIndexOffset:1000})
        .addTo(mapObj).bindPopup('📍 現在地');
      // 近接チェック
      updateProximity(lat, lng);
    },
    function(err){ console.log('位置情報エラー:', err.message); },
    {enableHighAccuracy:true, timeout:15000, maximumAge:10000}
  );
}

// ── 現在地 ──
// ── 共鳴グロー＋シナプス線 ──
var resonanceMarkers = [];
var synapseWrapper = null;
var watchId = null;
var lastUserPos = null;

function distKm(lat1,lng1,lat2,lng2){
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function clearSynapse(){
  if(synapseWrapper&&synapseWrapper.parentNode)synapseWrapper.parentNode.removeChild(synapseWrapper);
  synapseWrapper=null;
  resonanceMarkers.forEach(function(m){if(mapObj)mapObj.removeLayer(m);});
  resonanceMarkers=[];
}

function drawSynapse(ulat,ulng,nearItems){
  if(!mapObj)return;
  clearSynapse();
  if(!nearItems.length)return;

  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('style','position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;');

  var defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  // シナプスのダッシュアニメ
  var style=document.createElementNS('http://www.w3.org/2000/svg','style');
  style.textContent='@keyframes sd{0%{stroke-dashoffset:200;opacity:.2}50%{opacity:1}100%{stroke-dashoffset:0;opacity:.2}}@keyframes sp{0%,100%{opacity:.2;r:4}50%{opacity:1;r:8}}';
  defs.appendChild(style);

  nearItems.forEach(function(r,i){
    var delay=(i*0.35)+'s';
    var dist=distKm(ulat,ulng,r.lat,r.lng);
    var alpha=Math.max(0.3,1-dist/1.0);

    var p1=mapObj.latLngToContainerPoint([ulat,ulng]);
    var p2=mapObj.latLngToContainerPoint([r.lat,r.lng]);

    // グラデーション
    var gid='g'+r.id;
    var grad=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
    grad.setAttribute('id',gid);grad.setAttribute('gradientUnits','userSpaceOnUse');
    grad.setAttribute('x1',p1.x);grad.setAttribute('y1',p1.y);grad.setAttribute('x2',p2.x);grad.setAttribute('y2',p2.y);
    var s1=document.createElementNS('http://www.w3.org/2000/svg','stop');
    s1.setAttribute('offset','0%');s1.setAttribute('stop-color','rgba(100,200,255,'+alpha+')');
    var s2=document.createElementNS('http://www.w3.org/2000/svg','stop');
    s2.setAttribute('offset','100%');s2.setAttribute('stop-color','rgba(60,120,255,'+(alpha*0.3)+')');
    grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);

    // 線
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',p1.x);line.setAttribute('y1',p1.y);line.setAttribute('x2',p2.x);line.setAttribute('y2',p2.y);
    line.setAttribute('stroke','url(#'+gid+')');line.setAttribute('stroke-width','2.5');
    line.setAttribute('stroke-dasharray','14 8');line.setAttribute('stroke-linecap','round');
    line.style.animation='sd 1.6s linear '+delay+' infinite';
    svg.appendChild(line);

    // 末端の光の玉
    var circ=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circ.setAttribute('cx',p2.x);circ.setAttribute('cy',p2.y);circ.setAttribute('r','5');
    circ.setAttribute('fill','rgba(120,210,255,.9)');
    circ.style.animation='sp 1.6s ease-in-out '+delay+' infinite';
    svg.appendChild(circ);

    // 共鳴マーカー（青白グロー）
    var rm=L.marker([r.lat,r.lng],{icon:mkIcon(r.t,r.id,true),zIndexOffset:1000}).addTo(mapObj);
    resonanceMarkers.push(rm);
  });

  svg.appendChild(defs);
  var wrapper=document.createElement('div');
  wrapper.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:450;';
  wrapper.appendChild(svg);
  synapseWrapper=wrapper;
  var mapEl=document.getElementById('map');
  mapEl.style.position='relative';
  mapEl.appendChild(wrapper);

  // 地図移動時に再描画
  mapObj.off('moveend zoomend',redrawSynapse);
  mapObj.on('moveend zoomend',redrawSynapse);
}

function redrawSynapse(){
  if(!lastUserPos)return;
  var near=filtered().filter(function(r){return distKm(lastUserPos.lat,lastUserPos.lng,r.lat,r.lng)<=1.0;});
  drawSynapse(lastUserPos.lat,lastUserPos.lng,near);
}

function startResonance(){
  if(!mapObj)return;
  if(watchId!==null)navigator.geolocation.clearWatch(watchId);
  watchId=navigator.geolocation.watchPosition(
    function(pos){
      var ulat=pos.coords.latitude,ulng=pos.coords.longitude;
      lastUserPos={lat:ulat,lng:ulng};
      // 現在地マーカー更新
      if(locMarker)mapObj.removeLayer(locMarker);
      locMarker=L.circleMarker([ulat,ulng],{radius:12,fillColor:'#4A90D9',color:'#fff',weight:3,opacity:1,fillOpacity:0.9}).addTo(mapObj).bindPopup('📍 現在地');
      // 1km圏内のお店
      var near=filtered().filter(function(r){return distKm(ulat,ulng,r.lat,r.lng)<=1.0;});
      drawSynapse(ulat,ulng,near);
    },
    function(err){console.log('位置情報エラー:',err);},
    {enableHighAccuracy:true,maximumAge:10000,timeout:15000}
  );
}

function goToMyLocation(){
  if(!navigator.geolocation){alert('位置情報が利用できません');return;}
  if(!mapObj){initMap();}
  startResonance();
  navigator.geolocation.getCurrentPosition(
    function(pos){ mapObj.setView([pos.coords.latitude, pos.coords.longitude], 15); },
    function(){},
    {timeout:8000,maximumAge:30000}
  );
}
// ── view switch ──
function sv(v){
  curView=v;
  document.getElementById('lv').style.display=v==='list'?'block':'none';
  document.getElementById('mv').style.display=v==='map'?'block':'none';
  document.getElementById('bl').classList.toggle('on',v==='list');
  document.getElementById('bm').classList.toggle('on',v==='map');
  if(v==='map'){initMap();setTimeout(function(){if(mapObj){mapObj.invalidateSize();renderMarkers();}},150);}
}
var chips=document.querySelectorAll('.ch');
for(var ci=0;ci<chips.length;ci++){
  chips[ci].addEventListener('click',function(){
    for(var k=0;k<chips.length;k++)chips[k].classList.remove('on');
    this.classList.add('on');curCat=this.getAttribute('data-c');
    render();if(curView==='map')renderMarkers();
  });
}
document.getElementById('q').addEventListener('input',function(){curQ=this.value;render();if(curView==='map')renderMarkers();});
render();
</script>
